apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: affine-cnpg-backup
  namespace: affine
spec:
  schedule: "0 3 * * 7"          # 03:00 UTC Sundays — weekly (Velero runs at 04:00, same day)
  backupOwnerReference: self
  method: volumeSnapshot
  cluster:
    name: affine-cnpg
