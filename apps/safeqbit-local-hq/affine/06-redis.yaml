# 06-redis.yaml
# Redis for AFFiNE — session pub/sub and presence tracking.
#
# No persistence: AFFiNE uses Redis for ephemeral state (active sessions,
# collaboration presence, job queues). Safe to lose on restart; clients
# reconnect automatically. No PVC needed.
#
# Password is injected via shell so the value lands in the Redis process
# args without appearing in the pod spec env dump.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine-redis
  namespace: affine
  labels:
    app.kubernetes.io/name: affine
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: affine
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: affine
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["/bin/sh", "-c"]
          args:
            - redis-server --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affine-credentials
                  key: redis-password
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: tier
                    operator: In
                    values: ["primary"]

---
apiVersion: v1
kind: Service
metadata:
  name: affine-redis
  namespace: affine
  labels:
    app.kubernetes.io/name: affine
    app.kubernetes.io/component: redis
spec:
  selector:
    app.kubernetes.io/name: affine
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: 6379
