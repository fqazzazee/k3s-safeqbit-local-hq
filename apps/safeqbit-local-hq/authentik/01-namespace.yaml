# 01-namespace.yaml
# A dedicated namespace for Authentik. The labels are the contract between
# this app and the cluster's cross-cutting concerns:
#
#   - app.kubernetes.io/* labels: standard Kubernetes recommended labels
#   - cluster: which cluster (useful when you have more than one in the future)
#   - managed-by: flux is reconciling this resource, do not kubectl edit
#   - backup.policy/velero: tells the velero schedule to include this namespace

apiVersion: v1
kind: Namespace
metadata:
  name: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/managed-by: flux
    cluster: safeqbit-local-hq
    backup.policy/velero: weekly
