# 03-cnpg-cluster.yaml
# CloudNativePG Cluster for Authentik's database.
#
# The CNPG operator (deployed in cnpg-system) watches all namespaces and
# reconciles this Cluster CR. It creates:
#   - One Postgres 16 pod (authentik-cnpg-1)
#   - A Longhorn PVC per instance (managed by CNPG, not us)
#   - Three Services: authentik-cnpg-rw (primary), -ro (hot standby), -r (any)
#   - A secret named authentik-cnpg-app with the app user credentials
#
# bootstrap.initdb creates the "authentik" database and user on first boot.
# The password is auto-generated by CNPG and stored in authentik-cnpg-app.
# Authentik's HelmRelease reads the password from that secret.
#
# Replaces: 03-postgres-pvc.yaml, 04-postgres-statefulset.yaml, 05-postgres-service.yaml

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-cnpg
  namespace: authentik
spec:
  instances: 1

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: authentik
      owner: authentik

  storage:
    storageClass: longhorn
    size: 10Gi

  # Use the same VolumeSnapshotClass as Velero so CNPG can take its own
  # application-consistent snapshots (Postgres checkpoints before snap).
  # snapshotOwnerReference: backup ties each VolumeSnapshot to its Backup
  # object so CNPG cleans up snapshots when backups expire.
  backup:
    volumeSnapshot:
      className: longhorn-velero
      snapshotOwnerReference: backup

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: tier
                operator: In
                values: ["primary"]
    topologyKey: kubernetes.io/hostname

  monitoring:
    enablePodMonitor: true
