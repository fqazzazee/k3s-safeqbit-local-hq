# 03-postgres-pvc.yaml
# Static PVC for Postgres data on Longhorn.
#
# Why static (not StatefulSet volumeClaimTemplates):
#   - We run a single-replica DB, so the per-replica PVC naming pattern
#     ("data-authentik-postgres-0") that volumeClaimTemplates produces
#     buys us nothing.
#   - A stable, named PVC is easier to target with kubectl, restore from
#     Velero, or manually inspect.
#
# Storage class: longhorn (the default). Two replicas of the volume across
# our three nodes, served from local NVMe under /var/lib/longhorn.
# Access mode: ReadWriteOnce. Only the single Postgres pod mounts this.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-postgres-data
  namespace: authentik
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: authentik
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
