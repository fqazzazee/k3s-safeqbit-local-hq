apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-cnpg-backup
  namespace: authentik
spec:
  schedule: "0 2 * * *"          # 02:00 UTC daily — staggered 1h after authentik-cnpg
  backupOwnerReference: self
  method: volumeSnapshot
  cluster:
    name: authentik-cnpg
