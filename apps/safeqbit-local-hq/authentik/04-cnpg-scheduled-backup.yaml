apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-cnpg-backup
  namespace: authentik
spec:
  # CNPG ScheduledBackup uses 6-field cron (sec min hour dom mon dow).
  # Previously "0 2 * * *" parsed as sec=0 min=2 hour=* — fired hourly at :02.
  schedule: "0 0 2 * * *"        # 02:00:00 UTC daily — staggered 1h after authentik-cnpg
  backupOwnerReference: self
  method: volumeSnapshot
  cluster:
    name: authentik-cnpg
