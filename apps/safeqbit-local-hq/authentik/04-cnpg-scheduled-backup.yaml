apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-cnpg-backup
  namespace: authentik
spec:
  # CNPG ScheduledBackup uses 6-field cron (sec min hour dom mon dow).
  # Weekly Sunday 02:45 UTC — staggered from the daily clusters at 02:00/02:15/02:30.
  # Authentik has lower change velocity than affine/netbox so weekly is enough.
  # Retention controlled by configs/cnpg-backup-retention.yaml (keep newest 10).
  schedule: "0 45 2 * * 0"
  backupOwnerReference: self
  method: volumeSnapshot
  cluster:
    name: authentik-cnpg
