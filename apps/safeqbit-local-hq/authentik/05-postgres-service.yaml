# 05-postgres-service.yaml
# Headless Service paired with the StatefulSet. Resolves to:
#   authentik-postgres.authentik.svc.cluster.local
# from anywhere in the cluster, or just "authentik-postgres" from inside
# the authentik namespace (which is where Authentik's pods live).
#
# Headless (clusterIP: None) is StatefulSet idiom. With one replica it
# behaves identically to a normal ClusterIP for our purposes.

apiVersion: v1
kind: Service
metadata:
  name: authentik-postgres
  namespace: authentik
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: authentik
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: authentik
