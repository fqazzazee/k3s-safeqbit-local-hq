apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      # Upgrades MUST step through each authentik release sequentially:
      # 2025.10 -> 2026.2 -> 2026.5. This is hop 1; bump to 2026.5.x only
      # after this one is verified (login + forward auth).
      version: 2026.2.3
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  install:
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2

  values:
    global:
      env:
        - name: AUTHENTIK_HOST
          value: "https://authentik01.local.safeqbit.com/"
        - name: AUTHENTIK_LOG_LEVEL
          value: info
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: AUTHENTIK_SECRET_KEY
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-cnpg-app   # auto-created by CNPG operator
              key: password

    authentik:
      error_reporting:
        enabled: false

      postgresql:
        host: authentik-cnpg-rw
        port: 5432
        name: authentik
        user: authentik

    server:
      # 2 replicas: authentik fronts Grafana/Prometheus/Alertmanager (forward
      # auth) and is the OIDC IdP — losing it locks the dashboards mid-
      # incident. Stateless: state lives in CNPG (2 instances), media/templates
      # are RWX NFS, and 2025.x needs no Redis, so scaling is safe.
      replicas: 2
      service:
        type: ClusterIP
      ingress:
        enabled: false

      # The chart key is podAnnotations; the old server.pod.annotations nesting
      # was silently ignored (pods never carried the reloader annotation).
      podAnnotations:
        reloader.stakater.com/auto: "true"

      metrics:
        enabled: true
        serviceMonitor:
          enabled: false


      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
        - name: templates
          persistentVolumeClaim:
            claimName: authentik-templates
      volumeMounts:
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

    worker:
      replicas: 1
      podAnnotations:
        reloader.stakater.com/auto: "true"
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
        - name: templates
          persistentVolumeClaim:
            claimName: authentik-templates
      volumeMounts:
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          # 512Mi OOM-killed the 2026.2 worker during startup blueprint
          # reapplication. Revisit after 2026.5 (Rust worker, ~200Mi lighter).
          memory: 1Gi

    postgresql:
      enabled: false
