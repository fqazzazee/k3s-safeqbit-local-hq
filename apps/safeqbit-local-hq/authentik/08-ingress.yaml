# 08-ingress.yaml
# Ingress for Authentik at https://authentik.local.safeqbit.com/.
# cert-manager auto-issues a Let's Encrypt prod cert via DNS-01 (Cloudflare).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: ingress
  annotations:
    # ClusterIssuer set up in Lesson 4.
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Bigger proxy buffer for some Authentik admin pages that render large
    # policy/flow trees. Helps avoid 502 on the busiest admin views.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"

    # Reasonable upload cap for any media you might upload via the admin UI.
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"

spec:
  ingressClassName: nginx                    # ingress-nginx DaemonSet from Lesson 4

  tls:
    - hosts:
        - authentik.local.safeqbit.com
      secretName: authentik-tls              # cert-manager populates this

  rules:
    - host: authentik.local.safeqbit.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # The chart names the server Service "<release>-server".
                # Verify with `kubectl get svc -n authentik` after first
                # HelmRelease reconcile and adjust if the chart version
                # you pin uses a different naming convention.
                name: authentik-server
                port:
                  number: 80
