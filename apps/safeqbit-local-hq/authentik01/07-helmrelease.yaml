apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik01
  namespace: authentik01
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2025.10.3
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  install:
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2

  values:
    global:
      env:
        - name: AUTHENTIK_HOST
          value: "https://authentik01.local.safeqbit.com/"
        - name: AUTHENTIK_LOG_LEVEL
          value: info
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik01-credentials
              key: AUTHENTIK_SECRET_KEY
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik01-cnpg-app   # auto-created by CNPG operator
              key: password

    authentik:
      error_reporting:
        enabled: false

      postgresql:
        host: authentik01-cnpg-rw
        port: 5432
        name: authentik
        user: authentik

    server:
      replicas: 1
      service:
        type: ClusterIP
      ingress:
        enabled: false

      pod:
        annotations:
          reloader.stakater.com/auto: "true"

      metrics:
        enabled: true
        serviceMonitor:
          enabled: false

      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: tier
                    operator: In
                    values: ["primary"]

      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik01-media
        - name: templates
          persistentVolumeClaim:
            claimName: authentik01-templates
      volumeMounts:
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

    worker:
      replicas: 1
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: tier
                    operator: In
                    values: ["primary"]
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik01-media
        - name: templates
          persistentVolumeClaim:
            claimName: authentik01-templates
      volumeMounts:
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi

    postgresql:
      enabled: false
    redis:
      enabled: true
