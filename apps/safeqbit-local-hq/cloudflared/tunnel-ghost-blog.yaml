# apps/safeqbit-local-hq/cloudflared/tunnel-ghost-blog.yaml
# All Kubernetes resources for the ghost-blog-cf-tunnel Cloudflare tunnel.
# Routing rules live in the Cloudflare Zero Trust dashboard.
#
# Dashboard tip: set the service URL to the k8s internal name, not the local
# DNS hostname — e.g. http://ghost.<namespace>.svc.cluster.local — to avoid
# CNAME-chain DNS issues and unnecessary MetalLB roundtrips.

---
# ── 1 · SealedSecret ──────────────────────────────────────────────────────────
# Token sealed on 2026-05-21 with kubeseal v0.36.6 against
# sealed-secrets-controller v0.36.6 in kube-system.
# To re-seal after a key rotation:
#
#   kubectl create secret generic ghost-blog-cf-tunnel-token #     --namespace cloudflared #     --from-literal=token='<TOKEN>' #     --dry-run=client -o yaml #   | kubeseal #       --controller-name  sealed-secrets-controller #       --controller-namespace kube-system #       --format yaml #   > /tmp/ghost-blog-sealed.yaml && grep "token:" /tmp/ghost-blog-sealed.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghost-blog-cf-tunnel-token
  namespace: cloudflared
spec:
  encryptedData:
    token: 
  template:
    metadata:
      name: ghost-blog-cf-tunnel-token
      namespace: cloudflared
    type: Opaque

---
# ── 2 · Deployment ────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-blog-cf-tunnel
  namespace: cloudflared
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: ghost-blog-cf-tunnel
  template:
    metadata:
      labels:
        app: ghost-blog-cf-tunnel
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ghost-blog-cf-tunnel
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: tier
                    operator: In
                    values: ["primary"]
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.4.2
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ghost-blog-cf-tunnel-token
                  key: token
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30

---
# ── 3 · Service (metrics only) ────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: ghost-blog-cf-tunnel-metrics
  namespace: cloudflared
  labels:
    app: ghost-blog-cf-tunnel
spec:
  clusterIP: None
  selector:
    app: ghost-blog-cf-tunnel
  ports:
    - name: metrics
      port: 2000
      targetPort: metrics
      protocol: TCP

---
# ── 4 · ServiceMonitor ────────────────────────────────────────────────────────

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ghost-blog-cf-tunnel
  namespace: cloudflared
  labels:
    app: ghost-blog-cf-tunnel
    release: monitoring
spec:
  selector:
    matchLabels:
      app: ghost-blog-cf-tunnel
  namespaceSelector:
    matchNames:
      - cloudflared
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

---
# ── 5 · PodDisruptionBudget ───────────────────────────────────────────────────

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ghost-blog-cf-tunnel
  namespace: cloudflared
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ghost-blog-cf-tunnel
