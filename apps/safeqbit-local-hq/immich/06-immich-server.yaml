# 06-immich-server.yaml
# Immich server — REST API, web UI, background job orchestration.
#
# init container: waits for Postgres to accept connections before the
# server starts, preventing migration failures on cold boot.
#
# DB_* vars come from immich-credentials (SealedSecret). REDIS_HOSTNAME
# points to the immich-redis Service. IMMICH_MACHINE_LEARNING_URL points
# to the immich-machine-learning Service defined in 07-immich-ml.yaml.
#
# proxy-body-size 0 and proxy timeouts 600s are set on the Ingress; the
# server itself has no upload size limit configured here.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: server
spec:
  replicas: 1
  # Recreate: old pod must release the RWO Longhorn PVC before new pod can
  # attach. RollingUpdate would deadlock on Multi-Attach.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: immich
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich
        app.kubernetes.io/component: server
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:14-alpine
          command: ["/bin/sh", "-c"]
          args:
            - until pg_isready -h immich-postgres -p 5432; do echo "waiting for postgres"; sleep 2; done
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 2283
          env:
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-credentials
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-credentials
                  key: db-password
            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-credentials
                  key: db-name
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: REDIS_PORT
              value: "6379"
            - name: UPLOAD_LOCATION
              value: /data
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning:3003
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: external
              mountPath: /external
              readOnly: true
            - name: export
              mountPath: /export
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 2283
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 2283
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: immich-data
        - name: config
          persistentVolumeClaim:
            claimName: immich-config
        - name: external
          persistentVolumeClaim:
            claimName: immich-external
        - name: export
          persistentVolumeClaim:
            claimName: immich-export
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File

---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: immich
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: server
  ports:
    - port: 2283
      targetPort: 2283
