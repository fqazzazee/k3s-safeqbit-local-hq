# apps/safeqbit-local-hq/kustomization.yaml
# Top-level list of every app on the safeqbit-local-hq cluster. As you add
# apps, add them to the resources: list. Each entry is a relative path to a
# directory containing its own kustomization.yaml.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - vaultwarden
  - authentik
  - passzilla
  - netbox
  - affine
  - immich
  - photoprism
  - cloudflared
  - uptime-kuma
  - guacamole
  - pulse
  - home-assistant
  # pangolin removed 2026-06-18 — moving to a standalone Linux VM (docker-compose).
  # The k3s/MetalLB topology forced a non-stock split (separate edge/gerbil IPs,
  # /ping sidecar, hairpin) and the in-cluster Newt connector can't carry data
  # through the WG return path. See workbook/pangolin.md for the full history
  # (incl. the Gerbil 1.4.2 hole-punch fix) before any VM redeploy.
  # When you add Linkding or other apps later, append them here:
  # - linkding
  # - paperless-ngx
  # - homepage
