# 03-cnpg-cluster.yaml
# CNPG Cluster for Netbox's PostgreSQL database.
#
# The operator (in cnpg-system) creates:
#   - netbox-cnpg-1 pod (Postgres 16)
#   - Three services: netbox-cnpg-rw, netbox-cnpg-ro, netbox-cnpg-r
#   - Secret netbox-cnpg-app with the app user credentials
#
# instances: 2 — primary + 1 standby. Survives a single-node loss without
# the multi-minute pg_basebackup window a single-instance cluster needs to
# recover. Cost: a second 5Gi PVC (~15Gi after Longhorn replicas).

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: netbox-cnpg
  namespace: netbox
spec:
  instances: 2

  bootstrap:
    initdb:
      database: netbox
      owner: netbox

  storage:
    storageClass: longhorn
    size: 5Gi

  backup:
    volumeSnapshot:
      className: longhorn-velero
      snapshotOwnerReference: backup

  affinity:
    topologyKey: kubernetes.io/hostname

  monitoring:
    enablePodMonitor: true
