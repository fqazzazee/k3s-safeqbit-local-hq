# CloudNativePG cluster backing Pangolin.
#
# Pangolin stores all of its state here: orgs, users, sites, resources,
# access policies, sessions, and the EE license registration. PostgreSQL is
# the chart's recommended production backend (sqlite is dev-only).
#
# instances: 1 — homelab/internal workload, matching the guacamole rationale
# (see workbook/cnpg-strategy.md). Bump to 2 if Pangolin becomes a critical
# auth path. CNPG auto-creates the `pangolin-cnpg-app` Secret (keys include
# `uri`, `username`, `password`); the Pangolin HelmRelease consumes `uri`.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pangolin-cnpg
  namespace: pangolin
spec:
  instances: 1

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"

  bootstrap:
    initdb:
      database: pangolin
      owner: pangolin

  storage:
    storageClass: longhorn
    size: 5Gi

  backup:
    volumeSnapshot:
      className: longhorn-velero
      snapshotOwnerReference: backup

  affinity:
    topologyKey: kubernetes.io/hostname

  monitoring:
    enablePodMonitor: true
