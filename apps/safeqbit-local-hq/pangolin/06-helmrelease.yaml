# Pangolin (https://pangolin.net) deployed via the official (alpha) Helm chart.
#
# Topology: deployment.type=standalone + mode=multi. This mirrors Pangolin's
# proven docker-compose stack (Pangolin + Gerbil + a Pangolin-owned Traefik that
# loads routing from Pangolin's dynamic-config API) as three separate workloads,
# which is the most self-contained, lowest-risk path on this early chart. It
# avoids the pangolin-kube-controller + Traefik-CRD machinery of controller mode.
#
# Edge: Pangolin's own Traefik is the front door on a MetalLB LoadBalancer IP and
# does its own ACME (Cloudflare DNS-01) — it does NOT use the cluster's
# nginx-ingress/cert-manager. Gerbil exposes WireGuard UDP on a second MetalLB IP.
#
# Auth: starts with Pangolin's built-in accounts. Authentik OIDC SSO is added
# afterwards in the Pangolin admin UI (Identity Providers) — it is runtime state
# in the database, not a chart value. See workbook/pangolin.md.
#
# Image: ee-postgresql-1.19.2 (Enterprise + Postgres-capable + 1.19). Browser
# RDP/VNC/SSH stay locked until a (free, <$100k revenue) EE license key is
# entered at /admin/license.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pangolin
  namespace: pangolin
spec:
  interval: 30m
  chart:
    spec:
      chart: pangolin
      version: 0.1.0-alpha.0
      sourceRef:
        kind: HelmRepository
        name: fossorial
        namespace: flux-system

  install:
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2

  # The edge Traefik (a separate pod) writes acme.json to the shared RWX PVC
  # `pangolin-acme`. Mount it read-only into the server pod at the default scrape
  # path (/app/config/letsencrypt) so Pangolin's acmeCertSync can read issued
  # certs and flip per-resource cert status pending -> valid. Without it the
  # server warns "cannot stat config/letsencrypt/acme.json" every 5s and every
  # resource cert is stuck "pending" (see workbook/pangolin.md).
  #
  # Done via a post-render patch, NOT pangolin.extraVolumes: the 0.1.0-alpha.0
  # chart renders extraVolumeMounts with a broken `- {{- toYaml . | nindent 12 }}`
  # that produces invalid YAML and fails the Helm upgrade.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: pangolin
            patch: |
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: acme
                  persistentVolumeClaim:
                    claimName: pangolin-acme
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: acme
                  mountPath: /app/config/letsencrypt
                  readOnly: true
          # Newt's preflight is an HTTP GET to base_endpoint:80/ping, which only a
          # front Traefik answers — Gerbil never serves /ping. Since Gerbil has its
          # own IP (not shared with the edge), add a tiny http-echo sidecar that 200s
          # every path, and expose it as port 80 on the Gerbil LB. The sidecar binds
          # :8080 (unprivileged) and the service maps 80 -> 8080.
          - target:
              kind: Deployment
              name: pangolin-gerbil
            patch: |
              - op: add
                path: /spec/template/spec/containers/-
                value:
                  name: ping
                  image: hashicorp/http-echo:0.2.3
                  args: ["-listen=:8080", "-text=OK"]
                  ports:
                    - name: ping
                      containerPort: 8080
                  resources:
                    requests:
                      cpu: 10m
                      memory: 16Mi
                    limits:
                      cpu: 50m
                      memory: 32Mi
          - target:
              kind: Service
              name: pangolin-gerbil
            patch: |
              - op: add
                path: /spec/ports/-
                value:
                  name: ping
                  port: 80
                  targetPort: 8080
                  protocol: TCP

  values:
    deployment:
      type: standalone
      mode: multi

    # k3s enforces NetworkPolicy by default. The chart's policies are written for
    # the chart's *embedded* Postgres and a controller-mode topology: under
    # enforcement they would block Pangolin -> our external CNPG cluster (pod
    # label mismatch) and have no HTTPS egress at all (breaking external OIDC to
    # Authentik and the EE license check at app.pangolin.net). The rest of this
    # cluster runs without per-app NetworkPolicies, so disable these to match.
    # TODO(workbook/pangolin.md): author correct policies for this topology.
    networkPolicy:
      enabled: false

    # The namespace (with PSA enforce=privileged for Gerbil/NET_ADMIN) is managed
    # by 01-namespace.yaml, not the chart.
    namespace:
      create: false

    images:
      # Override the chart's automatic image selection (chart AppVersion is
      # 1.18.2) with the EE + Postgres + 1.19 image.
      pangolin:
        repository: fosrl/pangolin
        tag: "ee-postgresql-1.19.2"
      # The chart pins Gerbil 1.3.1, but Pangolin's own build pairs 1.19.2 with the
      # LATEST Gerbil (1.4.2). 1.3.1's hole-punch never registers here — Gerbil 1.4.2
      # "fixes registering issue when endpoint was the same" (all our exit nodes share
      # endpoint 10.10.13.52), which is exactly the Newt "last hole punch too old" /
      # Config version 0 / no-RDP-router failure. Pin Gerbil to match Pangolin.
      gerbil:
        tag: "1.4.2"

    # ---------------- Pangolin core ----------------
    pangolin:
      secret:
        # Use our pre-sealed SERVER_SECRET so it never rotates on upgrade.
        existingSecretName: pangolin-server-secret
        existingSecretKey: SERVER_SECRET
      ingressRoute:
        dashboard:
          # IngressRoute is a controller-mode (Traefik CRD) feature. In standalone
          # mode the dashboard is routed by Pangolin's own dynamic Traefik config,
          # and the IngressRoute CRD is not installed — so disable it.
          enabled: false
      config:
        app:
          dashboard_url: "https://pangolin.local.safeqbit.com"
          log_level: info
          telemetry:
            anonymous_usage: false
          notifications:
            product_updates: false
            new_releases: false
        domains:
          domain1:
            base_domain: "local.safeqbit.com"
            cert_resolver: "letsencrypt"
            # Per-host certs via DNS-01 (matches cert-manager's per-host approach
            # for the nginx apps). No wildcard — the cluster uses none.
            prefer_wildcard_cert: false
        gerbil:
          start_port: 51820
          clients_start_port: 21820
          # Public endpoint Newt dials (its own Gerbil LB IP). :80/ping is answered by
          # the http-echo sidecar; :51820/udp is Gerbil's WireGuard. See gerbil.service.
          base_endpoint: "10.10.13.52"
        traefik:
          enabled: true
          http_entrypoint: web
          https_entrypoint: websecure
          cert_resolver: letsencrypt
          prefer_wildcard_cert: false

    # ---------------- Database (externally-managed CNPG) ----------------
    # The CNPG operator is installed cluster-wide and the Cluster CR is hand
    # authored in 02-cnpg-cluster.yaml (matches the guacamole/authentik pattern),
    # so disable both bundled CNPG subcharts and consume CNPG's auto-generated
    # `pangolin-cnpg-app` Secret (key `uri`) directly.
    cnpg-operator:
      enabled: false
    cnpg-cluster:
      enabled: false
    database:
      mode: cloudnativepg
      name: pangolin
      username: pangolin
      cloudnativepg:
        cluster:
          name: pangolin-cnpg
          rwServiceName: pangolin-cnpg-rw
      connection:
        existingSecretName: pangolin-cnpg-app
        existingSecretKey: uri

    # ---------------- Gerbil (WireGuard tunnel server) ----------------
    gerbil:
      enabled: true
      service:
        type: LoadBalancer
        # Local preserves the WireGuard client source IP:port. Cluster's SNAT made the
        # site endpoint roam (~1/min) and broke hole-punch (UDP 21820), which destabilized
        # the Newt tunnel and stopped Pangolin from publishing resources. Gerbil has its
        # OWN IP (10.10.13.52) — NOT shared with the edge — because MetalLB won't share an
        # IP under Local. Newt's preflight (HTTP GET base_endpoint:80/ping) is answered by
        # a tiny http-echo sidecar on :80 (added via postRenderer), since Gerbil itself
        # never serves /ping. base_endpoint=10.10.13.52 below.
        externalTrafficPolicy: Local
        annotations:
          metallb.io/loadBalancerIPs: "10.10.13.52"
      persistence:
        # Persist Gerbil's WireGuard private key so peers don't re-handshake on
        # every restart.
        enabled: true
        size: 1Gi
        storageClass: longhorn

    # ---------------- Edge proxy: NOT the chart's Traefik ----------------
    # The chart's bundled Traefik is broken/absent in 0.1.0-alpha.x:
    #   - standalone Traefik never binds its admin/ping port -> CrashLoop, and
    #     hardcodes kubernetescrd/ingress providers (no CRDs/controller/SA here);
    #   - controller mode ships NO Traefik subchart, so installTraefikController
    #     deploys nothing.
    # So we disable the chart's Traefik and the kube-controller, and run our own
    # dedicated Traefik (09-traefik-deployment.yaml) wired the canonical Pangolin
    # way: HTTP provider -> http://pangolin:3001/api/v1/traefik-config + a file
    # provider for the dashboard routes + the Badger auth plugin. Pangolin still
    # GENERATES that routing config because pangolin.config.traefik.enabled=true.
    controller:
      enabled: false
    traefik:
      enabled: false
