# Shared ACME-state PVC for the Pangolin edge Traefik (writes acme.json to
# /letsencrypt) AND the Pangolin server (reads acme.json from
# /app/config/letsencrypt to populate per-resource cert status via acmeCertSync).
#
# RWX is required: the edge and the server are separate pods, and Pangolin's
# acmeCertSync scrapes Traefik's acme.json to flip a resource's cert status from
# "pending" to "valid". With the edge's old RWO PVC the server pod could not see
# acme.json, so every resource cert was stuck "pending". nfs-truenas (RWX) lets
# both pods mount the same file (edge RW, server RO).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pangolin-acme
  namespace: pangolin
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-truenas
  resources:
    requests:
      storage: 1Gi
