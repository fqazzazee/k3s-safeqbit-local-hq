# ACME-state PVC for the dedicated Pangolin edge Traefik (acme.json in /letsencrypt).
# Persisting it across restarts avoids re-issuing certs and tripping Let's
# Encrypt rate limits.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pangolin-edge-acme
  namespace: pangolin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
