# Dedicated Traefik edge proxy for Pangolin (replaces the chart's broken Traefik).
# Reads its static config from the ConfigMap, polls Pangolin's HTTP provider for
# resource routes, and terminates TLS with ACME (Cloudflare DNS-01). Runs as root
# so it can bind :80/:443 (the namespace PSA is already `privileged` for Gerbil).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pangolin-edge
  namespace: pangolin
  labels:
    app.kubernetes.io/name: pangolin
    app.kubernetes.io/component: edge-traefik
spec:
  replicas: 1
  strategy:
    type: Recreate            # single ACME PVC (RWO) — avoid two pods mounting it
  selector:
    matchLabels:
      app.kubernetes.io/name: pangolin
      app.kubernetes.io/component: edge-traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pangolin
        app.kubernetes.io/component: edge-traefik
    spec:
      securityContext:
        runAsUser: 0           # bind privileged ports 80/443
      containers:
        - name: traefik
          image: traefik:v3.6.15
          args:
            - --configFile=/etc/traefik/traefik_config.yml
          env:
            # lego Cloudflare provider (DNS-01). Token re-sealed into this ns.
            - name: CF_DNS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pangolin-traefik-cloudflare
                  key: dnsApiToken
          ports:
            - name: web
              containerPort: 80
              protocol: TCP
            - name: websecure
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/traefik
              readOnly: true
            - name: acme
              mountPath: /letsencrypt
          startupProbe:
            httpGet:
              path: /ping
              port: web
            periodSeconds: 5
            failureThreshold: 30   # allow time to fetch+compile the badger plugin
          livenessProbe:
            httpGet:
              path: /ping
              port: web
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: web
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: pangolin-edge-config
            items:
              - key: traefik_config.yml
                path: traefik_config.yml
              - key: dynamic_config.yml
                path: dynamic_config.yml
        - name: acme
          persistentVolumeClaim:
            claimName: pangolin-edge-acme
