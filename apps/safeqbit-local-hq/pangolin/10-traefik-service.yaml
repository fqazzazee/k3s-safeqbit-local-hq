# LoadBalancer for the Pangolin edge Traefik. Pinned to a reserved MetalLB IP
# (10.10.13.51) via annotation; this is the address all pangolin.* / resource
# CNAMEs point at.
#
# Shared IP with pangolin-gerbil: stock Pangolin runs Traefik (80/443) and Gerbil
# (WireGuard) on ONE public endpoint, and Newt's preflight reachability check is an
# HTTP GET to base_endpoint:80/ping — which only Traefik answers. We share 10.10.13.51
# between this service (80/443 TCP) and gerbil (51820/21820 UDP, 3004 TCP) via
# metallb.io/allow-shared-ip so base_endpoint=10.10.13.51 serves BOTH /ping and WG.
# MetalLB requires shared-IP services to use the same externalTrafficPolicy, so this
# is Local to match gerbil. Local is REQUIRED (not Cluster) for gerbil: Cluster's
# SNAT randomizes WireGuard's source IP:port, so the site's endpoint roamed every
# minute and Gerbil's hole-punch (UDP 21820) couldn't learn the site's real address.
# Local preserves the client source IP:port. Works because both the edge and gerbil
# pods sit on k3s-server-01, so MetalLB announces 10.10.13.51 from that one node.
apiVersion: v1
kind: Service
metadata:
  name: pangolin-edge
  namespace: pangolin
  labels:
    app.kubernetes.io/name: pangolin
    app.kubernetes.io/component: edge-traefik
  annotations:
    metallb.io/loadBalancerIPs: "10.10.13.51"
    metallb.io/allow-shared-ip: "pangolin-front"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: pangolin
    app.kubernetes.io/component: edge-traefik
  ports:
    - name: web
      port: 80
      targetPort: web
      protocol: TCP
    - name: websecure
      port: 443
      targetPort: websecure
      protocol: TCP
