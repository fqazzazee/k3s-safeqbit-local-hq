# LoadBalancer for the Pangolin edge Traefik. Pinned to a reserved MetalLB IP
# (10.10.13.51) via annotation; this is the address all pangolin.* / resource
# CNAMEs point at. externalTrafficPolicy: Local preserves the client source IP.
apiVersion: v1
kind: Service
metadata:
  name: pangolin-edge
  namespace: pangolin
  labels:
    app.kubernetes.io/name: pangolin
    app.kubernetes.io/component: edge-traefik
  annotations:
    metallb.io/loadBalancerIPs: "10.10.13.51"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: pangolin
    app.kubernetes.io/component: edge-traefik
  ports:
    - name: web
      port: 80
      targetPort: web
      protocol: TCP
    - name: websecure
      port: 443
      targetPort: websecure
      protocol: TCP
