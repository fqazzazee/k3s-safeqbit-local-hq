# In-cluster Newt site connector, on hostNetwork so its source IP is the node's
# LAN address (10.10.13.x) instead of a pod IP. This is REQUIRED here: a pod
# reaching the cluster's own MetalLB LB IP (Gerbil 10.10.13.52) over UDP is the
# hairpin case and the hole-punch (UDP 21820) never registers. On hostNetwork the
# Newt behaves like a real host on the 10.10.13.0/24 segment, so the hole-punch
# reaches Gerbil normally. Newt uses userspace WireGuard (netstack) — no NET_ADMIN.
# (ns PSA is privileged, so hostNetwork is allowed.)
#
# Credentials come from the SealedSecret pangolin-newt (NEWT_ID / NEWT_SECRET).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pangolin-newt
  namespace: pangolin
  labels:
    app.kubernetes.io/name: pangolin
    app.kubernetes.io/component: newt
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pangolin
      app.kubernetes.io/component: newt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pangolin
        app.kubernetes.io/component: newt
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet   # resolve pangolin.local.safeqbit.com via CoreDNS->upstream
      containers:
        - name: newt
          image: fosrl/newt:1.13.0
          env:
            - name: PANGOLIN_ENDPOINT
              value: "https://pangolin.local.safeqbit.com"
            - name: NEWT_ID
              valueFrom:
                secretKeyRef:
                  name: pangolin-newt
                  key: NEWT_ID
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pangolin-newt
                  key: NEWT_SECRET
          volumeMounts:
            - name: config
              mountPath: /root/.config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          emptyDir: {}
