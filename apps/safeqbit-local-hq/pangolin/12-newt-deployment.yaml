# In-cluster Newt site connector (pod network). Newt uses userspace WireGuard
# (netstack), so no NET_ADMIN is needed and its self-ping to the exit node is
# handled in-process.
#
# NOTE: we briefly tried hostNetwork (to get a 10.10.13.x source IP) while chasing
# a "hole punch never registers" failure — but the real cause was Gerbil 1.3.1's
# hole-punch bug, fixed by pinning Gerbil 1.4.2 (see 06-helmrelease images.gerbil).
# hostNetwork actually broke the netstack ICMP self-ping ("no route to host"), so
# we reverted to pod networking now that the hole-punch works server-side.
#
# Credentials come from the SealedSecret pangolin-newt (NEWT_ID / NEWT_SECRET).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pangolin-newt
  namespace: pangolin
  labels:
    app.kubernetes.io/name: pangolin
    app.kubernetes.io/component: newt
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pangolin
      app.kubernetes.io/component: newt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pangolin
        app.kubernetes.io/component: newt
    spec:
      containers:
        - name: newt
          image: fosrl/newt:1.13.0
          env:
            - name: PANGOLIN_ENDPOINT
              value: "https://pangolin.local.safeqbit.com"
            - name: NEWT_ID
              valueFrom:
                secretKeyRef:
                  name: pangolin-newt
                  key: NEWT_ID
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pangolin-newt
                  key: NEWT_SECRET
          volumeMounts:
            - name: config
              mountPath: /root/.config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          emptyDir: {}
