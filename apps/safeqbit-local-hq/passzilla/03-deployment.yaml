apiVersion: apps/v1
kind: Deployment
metadata:
  name: passzilla
  namespace: passzilla
spec:
  replicas: 1
  # Recreate: old pod must release the RWO Longhorn PVC before new pod can
  # attach. RollingUpdate would deadlock on Multi-Attach.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: passzilla
  template:
    metadata:
      labels:
        app: passzilla
    spec:
      # Single-replica by design (DB on RWO Longhorn) — availability =
      # reschedule speed. Evict after 60s of node not-ready/unreachable
      # instead of the 300s default; Longhorn's node-down-pod-deletion-policy
      # force-releases the volume so the new pod can attach elsewhere.
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60

      securityContext:
        fsGroup: 1000

      containers:
        - name: passzilla
          # Pinned to a specific tag — `:latest` would silently roll on every
          # pod restart that triggered a pull, breaking reproducibility.
          # Bump deliberately when you've reviewed the upstream changelog.
          image: pglombardo/pwpush:2.7.0

          # PasswordPusher listens on 5100 by default.
          ports:
            - containerPort: 5100
              name: http

          envFrom:
            - configMapRef:
                name: passzilla-config
            # SECRET_KEY_BASE persists Rails session cookies across restarts.
            # Without it pwpush logs "SECRET_KEY_BASE not set; generating a
            # random key for this boot" and every pod restart invalidates
            # all active user sessions. Sealed in 04-sealed-secret.yaml.
            - secretRef:
                name: passzilla-secret

          volumeMounts:
            - name: db
              mountPath: /opt/PasswordPusher/storage/db

          resources:
            requests:
              cpu: 50m
              # pwpush 2.7 (Rails 8 web + worker under foreman) idles at
              # ~480Mi RSS — request must reflect that or the scheduler
              # over-packs the node.
              memory: 512Mi
            limits:
              # 512Mi OOMKilled the pod every ~15min (1,671 restarts in 22
              # days). Idle baseline barely fit; any Ruby heap growth crossed
              # the limit. 2x baseline leaves room for real request load.
              memory: 1Gi

          readinessProbe:
            httpGet:
              path: /
              port: 5100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 5100
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: passzilla-db
