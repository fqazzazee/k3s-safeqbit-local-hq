# 03-sealed-secret.yaml
# Pulse built-in web-UI admin credentials (PULSE_AUTH_USER / PULSE_AUTH_PASS).
# Plaintext password is auto-hashed by Pulse on startup; providing it via env
# means auth is enforced from the very first pod boot (no unauthenticated
# window at the ingress). Decrypts to a normal Secret named "pulse-auth".
#
# To rotate: change it in the Pulse UI (Settings → Security), OR re-seal a new
# value and roll the Deployment. Re-seal with kubeseal against the
# sealed-secrets-controller in kube-system (see workbook/maintenance.md).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: pulse-auth
  namespace: pulse
spec:
  encryptedData:
    PULSE_AUTH_PASS: 
    PULSE_AUTH_USER: 
  template:
    metadata:
      name: pulse-auth
      namespace: pulse
