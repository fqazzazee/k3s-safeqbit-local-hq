# 07-agent-sealed-secret.yaml
# API token the Pulse k3s DaemonSet agent uses to report to the Pulse server.
# Generated in the Pulse UI (Settings → API Tokens) with scope
# `kubernetes:report`. Decrypts to a Secret named "pulse-agent-token" with key
# PULSE_TOKEN, consumed by the DaemonSet (08-agent-daemonset.yaml).
#
# To rotate: revoke + reissue the token in the Pulse UI, re-seal the new value
# (kubeseal against sealed-secrets-controller in kube-system), and roll the
# DaemonSet.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: pulse-agent-token
  namespace: pulse
spec:
  encryptedData:
    PULSE_TOKEN: 
  template:
    metadata:
      name: pulse-agent-token
      namespace: pulse
