# 03-deployment.yaml
# Uptime Kuma server Deployment + ClusterIP Service.
#
# Single replica, no external database — Uptime Kuma stores its state in an
# embedded SQLite DB on the uptime-kuma-data PVC. There is no value in scaling
# this beyond one replica.
#
# Image is pinned to a specific 1.x tag (not :1 or :latest) so a pod restart
# can't silently roll us onto a new minor that changes the DB schema. Bump
# deliberately after reading the upstream release notes:
#   https://github.com/louislam/uptime-kuma/releases
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: server
spec:
  replicas: 1
  # Recreate: terminate old pod before starting new. The data PVC is an RWO
  # Longhorn volume — RollingUpdate would deadlock on Multi-Attach (the new
  # pod can't acquire the volume while the old one still holds it).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-kuma
        app.kubernetes.io/component: server
    spec:
      # Single-replica by design (SQLite on RWO Longhorn) — availability =
      # reschedule speed. Evict after 60s of node not-ready/unreachable
      # instead of the 300s default; Longhorn's node-down-pod-deletion-policy
      # force-releases the volume so the new pod can attach elsewhere.
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:2.4.0
          ports:
            - containerPort: 3001
              name: http
          volumeMounts:
            - name: data
              mountPath: /app/data
          # Uptime Kuma ships its own healthcheck binary that knows how to talk
          # to the internal server (handles the SPA + websocket correctly),
          # which is more reliable than a bare httpGet against the SPA root.
          readinessProbe:
            exec:
              command: ["extra/healthcheck"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["extra/healthcheck"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
