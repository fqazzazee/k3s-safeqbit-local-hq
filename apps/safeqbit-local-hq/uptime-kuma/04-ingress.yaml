# 04-ingress.yaml
# Ingress for Uptime Kuma at https://uptime.local.safeqbit.com
# cert-manager auto-issues a Let's Encrypt prod cert via DNS-01 (Cloudflare).
#
# Both the admin dashboard and the status page(s) are served from this one
# hostname. Status pages live under /status/<slug>; the editor and live
# dashboard are at the root.
#
# Uptime Kuma's live dashboard and status pages use a long-lived socket.io
# (WebSocket) connection. nginx upgrades the connection automatically, but the
# default 60s proxy timeouts would tear the socket down and make the UI
# reconnect constantly — the extended read/send timeouts keep it stable.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - uptime.local.safeqbit.com
      secretName: uptime-kuma-tls
  rules:
    - host: uptime.local.safeqbit.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uptime-kuma
                port:
                  number: 3001
