# backup-summary-report.yaml
# Weekly Slack digest of backup health: one message with every Velero
# schedule and CNPG ScheduledBackup — last run status, data moved, next run,
# backup counts, retention — plus B2 bucket usage vs the 10GB free tier and
# warnings for anything missed, failed, or stale.
#
# Runs Mondays 08:00 America/New_York in the monitoring namespace (so it can
# reuse the alertmanager-slack-webhook SealedSecret; SealedSecrets are
# namespace-scoped). Reads velero.io and postgresql.cnpg.io resources
# cluster-wide via a read-only ClusterRole, plus the velero/cloud-credentials
# secret (via a resourceName-scoped Role) to list the B2 bucket over the
# S3 API for storage metrics. B2 has no public API for the account dashboard
# (caps %, transaction counts) — bucket listing is what's available.
#
# Manual run:
#   kubectl -n monitoring create job --from=cronjob/backup-summary-report report-now
#
# Local test (prints instead of posting):
#   kubectl proxy &
#   API_BASE=http://127.0.0.1:8001 DRY_RUN=1 python3 <script below>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-summary-report
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-summary-report
rules:
  - apiGroups: ["velero.io"]
    resources: ["schedules", "backups", "backupstoragelocations", "datauploads"]
    verbs: ["get", "list"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["scheduledbackups", "backups"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backup-summary-report
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backup-summary-report
subjects:
  - kind: ServiceAccount
    name: backup-summary-report
    namespace: monitoring
---
# Read exactly one secret: the B2 credentials Velero already uses, so the
# report can list the bucket for storage metrics.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-summary-report-b2creds
  namespace: velero
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cloud-credentials"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-summary-report-b2creds
  namespace: velero
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-summary-report-b2creds
subjects:
  - kind: ServiceAccount
    name: backup-summary-report
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-summary-report-script
  namespace: monitoring
data:
  report.py: |
    #!/usr/bin/env python3
    """Post a one-message Slack digest of Velero + CNPG backup health."""
    import base64, hashlib, hmac, json, os, ssl, sys, time
    import urllib.error, urllib.parse, urllib.request
    import xml.etree.ElementTree as ElementTree
    from datetime import datetime, timedelta, timezone

    SA = "/var/run/secrets/kubernetes.io/serviceaccount"
    # In-cluster: use the env-injected API IP, not kubernetes.default.svc.
    # The cluster's ndots:5 + local.safeqbit.com search domain makes short
    # in-cluster names flap under musl resolvers (alpine images).
    # The apiserver cert carries the ClusterIP as an IP SAN, so TLS verifies.
    API_BASE = os.environ.get("API_BASE") or (
        "https://" + os.environ["KUBERNETES_SERVICE_HOST"] + ":"
        + os.environ.get("KUBERNETES_SERVICE_PORT_HTTPS", "443"))
    NOW = datetime.now(timezone.utc).replace(second=0, microsecond=0)

    # Keep in sync with the `prune` lines in cnpg-backup-retention.yaml.
    CNPG_KEEP = {"authentik": 10, "affine": 30, "netbox": 30,
                 "monitoring": 30, "guacamole": 10}
    B2_FREE_TIER = 10 * 1024**3

    ICON = {"OK": ":white_check_mark:", "PARTIAL": ":warning:",
            "FAIL": ":x:", "BADCFG": ":x:", "RUNNING": ":hourglass_flowing_sand:",
            "PAUSED": ":double_vertical_bar:", "-": ":new:"}

    def api(path):
        req = urllib.request.Request(API_BASE + path)
        ctx = None
        if API_BASE.startswith("https"):
            tok = open(f"{SA}/token").read()
            req.add_header("Authorization", f"Bearer {tok}")
            ctx = ssl.create_default_context(cafile=f"{SA}/ca.crt")
        # Retry 429/5xx: API priority-and-fairness throttles bursts of
        # list calls; transient by design.
        for attempt in range(5):
            try:
                with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                    return json.load(r)
            except urllib.error.HTTPError as e:
                if e.code not in (429, 500, 503) or attempt == 4:
                    raise
                time.sleep(2 * (attempt + 1))

    # --- minimal 5-field cron (UTC): supports "*", "a,b", "*/n", plain ints
    def _match(field, val, base=0):
        if field == "*":
            return True
        for part in field.split(","):
            if part.startswith("*/"):
                if (val - base) % int(part[2:]) == 0:
                    return True
            elif int(part) == val or (int(part) == 7 and val == 0):
                return True  # dow 7 == Sunday == 0
        return False

    def _cron_hits(cron, t):
        m, h, dom, mon, dow = cron.split()
        return (_match(m, t.minute) and _match(h, t.hour)
                and _match(mon, t.month, 1)
                # standard cron: dom and dow are OR'd when both restricted
                and ((_match(dom, t.day, 1) and dom != "*") or
                     (_match(dow, t.isoweekday() % 7) and dow != "*") or
                     (dom == "*" and dow == "*")))

    def cron_next(cron, frm=NOW):
        t = frm + timedelta(minutes=1)
        for _ in range(60 * 24 * 35):
            if _cron_hits(cron, t):
                return t
            t += timedelta(minutes=1)
        return None

    def cron_prev(cron, frm=NOW):
        t = frm
        for _ in range(60 * 24 * 35):
            if _cron_hits(cron, t):
                return t
            t -= timedelta(minutes=1)
        return None

    def ts(s):
        return datetime.strptime(s, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)

    def to_et(dt):
        """UTC -> US Eastern. Hand-rolled DST rule (2nd Sun Mar 02:00 ET ->
        1st Sun Nov 02:00 ET) because python:alpine ships no tzdata."""
        def nth_sunday(month, n):
            first = datetime(dt.year, month, 1, tzinfo=timezone.utc)
            return first + timedelta(days=(6 - first.weekday()) % 7 + 7 * (n - 1))
        dst_start = nth_sunday(3, 2).replace(hour=7)   # 02:00 EST == 07:00 UTC
        dst_end = nth_sunday(11, 1).replace(hour=6)    # 02:00 EDT == 06:00 UTC
        return dt - timedelta(hours=4 if dst_start <= dt < dst_end else 5)

    def fmt(dt):
        return to_et(dt).strftime("%a %m-%d %H:%M") if dt else "never"

    def human(n):
        for unit in ("B", "KiB", "MiB", "GiB", "TiB"):
            if n < 1024 or unit == "TiB":
                return f"{n:,.0f} {unit}" if unit == "B" else f"{n:.1f} {unit}"
            n /= 1024

    # ---- B2 bucket usage via S3 ListObjectsV2 (SigV4, stdlib only) ----
    def s3_list_page(host, bucket, region, ak, sk, token=None):
        query = {"list-type": "2", "max-keys": "1000"}
        if token:
            query["continuation-token"] = token
        qs = "&".join(f"{urllib.parse.quote(k, safe='')}"
                      f"={urllib.parse.quote(v, safe='')}"
                      for k, v in sorted(query.items()))
        t = datetime.now(timezone.utc)
        amzdate, datestamp = t.strftime("%Y%m%dT%H%M%SZ"), t.strftime("%Y%m%d")
        payload_hash = hashlib.sha256(b"").hexdigest()
        headers = {"host": host, "x-amz-content-sha256": payload_hash,
                   "x-amz-date": amzdate}
        signed = ";".join(sorted(headers))
        canonical = "\n".join(
            ["GET", f"/{bucket}", qs,
             "".join(f"{k}:{headers[k]}\n" for k in sorted(headers)),
             signed, payload_hash])
        scope = f"{datestamp}/{region}/s3/aws4_request"
        to_sign = "\n".join(["AWS4-HMAC-SHA256", amzdate, scope,
                             hashlib.sha256(canonical.encode()).hexdigest()])
        def hm(key, msg):
            return hmac.new(key, msg.encode(), hashlib.sha256).digest()
        key = hm(hm(hm(hm(("AWS4" + sk).encode(), datestamp), region), "s3"),
                 "aws4_request")
        sig = hmac.new(key, to_sign.encode(), hashlib.sha256).hexdigest()
        req = urllib.request.Request(
            f"https://{host}/{bucket}?{qs}",
            headers={"Authorization":
                     f"AWS4-HMAC-SHA256 Credential={ak}/{scope}, "
                     f"SignedHeaders={signed}, Signature={sig}",
                     "x-amz-date": amzdate,
                     "x-amz-content-sha256": payload_hash})
        with urllib.request.urlopen(req, timeout=60) as r:
            return r.read()

    def b2_usage():
        """(total_bytes, object_count) or (None, None) if unavailable —
        the report must still post if B2 is unreachable."""
        try:
            sec = api("/api/v1/namespaces/velero/secrets/cloud-credentials")
            ini = base64.b64decode(sec["data"]["cloud"]).decode()
            ak = sk = None
            for line in ini.splitlines():
                k, _, v = line.partition("=")
                if k.strip() == "aws_access_key_id":
                    ak = v.strip()
                if k.strip() == "aws_secret_access_key":
                    sk = v.strip()
            bsl = api("/apis/velero.io/v1/namespaces/velero"
                      "/backupstoragelocations/default")
            bucket = bsl["spec"]["objectStorage"]["bucket"]
            region = bsl["spec"]["config"]["region"]
            host = urllib.parse.urlparse(bsl["spec"]["config"]["s3Url"]).netloc
            total = count = 0
            token = None
            for _ in range(100):  # hard cap ~100k objects
                root = ElementTree.fromstring(
                    s3_list_page(host, bucket, region, ak, sk, token))
                ns = root.tag.split("}")[0].strip("{") if "}" in root.tag else ""
                def find(el, name):
                    return el.find(f"{{{ns}}}{name}" if ns else name)
                for c in root.iter(f"{{{ns}}}Contents" if ns else "Contents"):
                    total += int(find(c, "Size").text)
                    count += 1
                trunc = find(root, "IsTruncated")
                if trunc is None or trunc.text != "true":
                    break
                token = find(root, "NextContinuationToken").text
            return total, count
        except Exception as e:  # never let metrics kill the report
            print(f"b2 usage unavailable: {e}", file=sys.stderr)
            return None, None

    warnings = []

    # ---------------- Velero ----------------
    schedules = api("/apis/velero.io/v1/namespaces/velero/schedules")["items"]
    backups = api("/apis/velero.io/v1/namespaces/velero/backups")["items"]
    # DataUploads are v2alpha1, unlike the rest of velero.io
    datauploads = api("/apis/velero.io/v2alpha1/namespaces/velero/datauploads")["items"]
    PHASE = {"Completed": "OK", "PartiallyFailed": "PARTIAL", "Failed": "FAIL",
             "InProgress": "RUNNING", "FailedValidation": "BADCFG"}
    vlines = []
    healthy = 0
    for s in sorted(schedules, key=lambda x: x["metadata"]["name"]):
        name, cron = s["metadata"]["name"], s["spec"]["schedule"]
        mine = [b for b in backups if b["metadata"].get("labels", {})
                .get("velero.io/schedule-name") == name]
        mine.sort(key=lambda b: b["status"].get("startTimestamp", ""))
        last = mine[-1] if mine else None
        last_t = ts(last["status"]["startTimestamp"]) if last and \
            last["status"].get("startTimestamp") else None
        phase = PHASE.get(last["status"].get("phase", "?"), "?") if last else "-"
        ttl_h = int(s["spec"]["template"].get("ttl", "720h0m0s").split("h")[0])
        nxt, prev = cron_next(cron), cron_prev(cron)
        created = ts(s["metadata"]["creationTimestamp"])
        moved = sum(int(d["status"].get("progress", {}).get("totalBytes", 0))
                    for d in datauploads
                    if last and d["metadata"].get("labels", {})
                    .get("velero.io/backup-name") == last["metadata"]["name"])
        if s["spec"].get("paused"):
            phase = "PAUSED"
            warnings.append(f":warning: `{name}` is PAUSED — no backups run.")
        # missed = most recent expected fire produced no backup (2h grace).
        # A fire slot older than the schedule itself doesn't count (a
        # young schedule hasn't had its first run yet).
        elif prev and prev > created and NOW > prev + timedelta(hours=2) and \
                (not last_t or last_t < prev - timedelta(minutes=5)):
            warnings.append(
                f":warning: `{name}` MISSED its {fmt(prev)} run "
                f"(last actual: {fmt(last_t)}). Next try: {fmt(nxt)} ET.")
        ok = [b for b in mine if b["status"].get("phase") == "Completed"]
        if phase in ("PARTIAL", "FAIL", "BADCFG"):
            since = fmt(ts(ok[-1]["status"]["startTimestamp"])) if ok else "never"
            warnings.append(
                f":warning: `{name}` last run {phase}; last full success: "
                f"{since}. Effect: k8s objects/volumes restore only from that "
                f"point. Next try: {fmt(nxt)} ET.")
        if phase == "OK":
            healthy += 1
            detail = f"last {fmt(last_t)}"
            if moved:
                detail += f" ({human(moved)} moved)"
        elif phase == "-":
            detail = f"no backups yet, first run {fmt(nxt)}"
        else:
            detail = f"{phase} at {fmt(last_t)}"
        vlines.append(f"{ICON.get(phase, ':grey_question:')} *{name}* — "
                      f"{detail} · next {fmt(nxt)} · {len(mine)} kept · "
                      f"TTL {ttl_h // 24}d")

    # ---------------- CNPG ----------------
    sbs = api("/apis/postgresql.cnpg.io/v1/scheduledbackups")["items"]
    cbs = api("/apis/postgresql.cnpg.io/v1/backups")["items"]
    clines = []
    chealthy = 0
    for s in sorted(sbs, key=lambda x: x["metadata"]["namespace"]):
        ns_, cluster = s["metadata"]["namespace"], s["spec"]["cluster"]["name"]
        cron = " ".join(s["spec"]["schedule"].split()[1:])  # drop seconds field
        mine = [b for b in cbs if b["metadata"]["namespace"] == ns_
                and b["spec"]["cluster"]["name"] == cluster]
        mine.sort(key=lambda b: b["metadata"]["creationTimestamp"])
        last = mine[-1] if mine else None
        last_t = ts(last["metadata"]["creationTimestamp"]) if last else None
        phase = {"completed": "OK", "failed": "FAIL"}.get(
            last["status"].get("phase", "?") if last else "-", "...")
        nxt, prev = cron_next(cron), cron_prev(cron)
        keep = CNPG_KEEP.get(ns_)
        created = ts(s["metadata"]["creationTimestamp"])
        if phase == "FAIL":
            warnings.append(f":warning: CNPG `{cluster}` last backup FAILED. "
                            f"Next try: {fmt(nxt)} ET.")
        if prev and prev > created and NOW > prev + timedelta(hours=2) and \
                (not last_t or last_t < prev - timedelta(minutes=5)):
            warnings.append(f":warning: CNPG `{cluster}` MISSED its "
                            f"{fmt(prev)} run. Next try: {fmt(nxt)} ET.")
        if phase == "OK":
            chealthy += 1
        kept = f"{len(mine)} kept" + (f" (max {keep})" if keep else "")
        clines.append(f"{ICON.get(phase, ':grey_question:')} *{cluster}* — "
                      f"last {fmt(last_t)} · next {fmt(nxt)} · {kept}")

    # ---------------- B2 + BSL ----------------
    bsl_phase = api("/apis/velero.io/v1/namespaces/velero"
                    "/backupstoragelocations/default")["status"].get("phase", "?")
    b2_bytes, b2_objects = b2_usage()
    if b2_bytes is not None:
        pct = 100 * b2_bytes / B2_FREE_TIER
        b2_icon = ":white_check_mark:" if pct < 80 else ":warning:"
        b2_line = (f"{b2_icon} *B2 bucket*: {human(b2_bytes)} of 10 GiB free "
                   f"tier ({pct:.0f}%) · {b2_objects:,} objects · "
                   f"connection {bsl_phase}")
        if pct >= 80:
            warnings.append(
                f":warning: B2 bucket at {pct:.0f}% of the 10 GiB free tier — "
                f"expired-backup cleanup may lag TTLs; consider pruning or "
                f"revisiting retention.")
    else:
        b2_line = (f":grey_question: *B2 bucket*: usage unavailable this run · "
                   f"connection {bsl_phase}")

    msg = (f":floppy_disk: *Backup summary — {to_et(NOW).strftime('%Y-%m-%d %H:%M')} ET*\n\n"
           f"*Velero → B2* ({healthy}/{len(vlines)} healthy · namespace objects "
           f"+ Longhorn volumes; NFS data = TrueNAS's job)\n"
           + "\n".join(vlines) + "\n\n"
           f"*CNPG snapshots* ({chealthy}/{len(clines)} healthy · postgres, "
           f"local Longhorn, pruned daily ~01:00 ET)\n"
           + "\n".join(clines) + "\n\n" + b2_line + "\n\n")
    msg += ("*Needs attention:*\n" + "\n".join(warnings) if warnings
            else ":white_check_mark: All schedules on time, nothing missed.")

    if os.environ.get("DRY_RUN"):
        print(msg)
        sys.exit(0)
    req = urllib.request.Request(
        os.environ["SLACK_WEBHOOK_URL"],
        data=json.dumps({"text": msg}).encode(),
        headers={"Content-Type": "application/json"})
    with urllib.request.urlopen(req, timeout=30) as r:
        body = r.read().decode()
        if body != "ok":
            print(f"slack post failed: {body}", file=sys.stderr)
            sys.exit(1)
    print("report posted")
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-summary-report
  namespace: monitoring
spec:
  schedule: "0 8 * * 1"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      # Hard stop so a hung job can never wedge the schedule (see the
      # netbox-housekeeping incident: stuck Active job + Forbid = silently
      # never runs again).
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: backup-summary-report
          restartPolicy: Never
          # ndots:1 so hooks.slack.com / s3.*.backblazeb2.com resolve as
          # absolute names. The cluster default (ndots:5 + local.safeqbit.com
          # search domain) breaks multi-dot names under musl resolvers
          # (python:alpine). The k8s API needs no DNS at all (ClusterIP).
          dnsConfig:
            options:
              - name: ndots
                value: "1"
          containers:
            - name: report
              # Stdlib-only script; pinned digest-stable minor tag.
              image: python:3.13-alpine
              command: ["python3", "/scripts/report.py"]
              env:
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: alertmanager-slack-webhook
                      key: webhook-url
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: backup-summary-report-script
