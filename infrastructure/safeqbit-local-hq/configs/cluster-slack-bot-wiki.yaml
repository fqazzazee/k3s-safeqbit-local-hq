    • *uptime-kuma* — uptime checks (uptime.…); SQLite/Longhorn
    • *pulse* — Proxmox/k3s/Docker monitoring (pulse.…)
    • *monitoring* — prometheus/grafana/alertmanager + this bot
    Per-app backup schedules/TTLs: workbook/backup-strategy.md.
    _Bot: `/cluster pods <ns>` · `ps <ns>` · `deploys <ns>`._
  cluster.gotchas: |
    *Gotchas hall of fame* — hard-won, cluster-specific
    • *DNS ndots:5 amplification* — <5-dot names get search-domain
      expanded; glibc flaps on 4-dot FQDNs, musl hard-fails even
      external names. Fix in Git via dnsConfig ndots:1 (live patches
      get SSA-stripped). Broke Sensi + Jellyfin on HA cutover.
    • *flannel VXLAN checksum offload* — after a Proxmox reboot,
      cross-node TCP/UDP dies while ICMP works;
      flannel-fix-offload.service on each node handles it.
    • *multipathd vs Longhorn* — without the `^sd[a-z]+` blacklist in
      /etc/multipath.conf, CSI mounts fail. Node-local config.
    • *`rollout restart` double-rolls* — Flux SSA strips restartedAt;
      delete pods one at a time instead.
    • *`kubectl get backup` in ns velero* hits backups.longhorn.io —
      spell out `backups.velero.io`.
    • *Velero backups delete via CLI only* — kubectl delete is
      resurrected by backup-sync.
    • *Longhorn engine live-upgrade* — auto-upgrade limit DEFAULTS TO
      0 (off); we set 1/node. Engines stay old after upgrades if 0.
    • *Longhorn expansion wedge* post-reboot (stale iscsid PID) —
      delete the volume's Engine CR; data safe.
    • *B2 free tier* — kopia maintenance can blow the 2,500/day
      Class-B cap; raising it needs a payment method.
    • *Velero-restored CertificateRequests* silently block renewals
      while the cert shows Ready — delete restored CRs.
    • *Sensi ws death* — integration freezes silently (entity stays
      "online", controls no-op); reload integration/restart HA pod.
    • *HA internal_url* — if unset, HA advertises its POD IP and
      rewrites IoT websocket targets; keep http://10.10.13.51:8123.
    • *Pulse k8s agent flap* — any UI config save orphans the agent
      handler; restart the pulse pod.
    • *Longhorn snapshots never fold into the live head* — a removed
      snapshot reclaims only into a NEWER snapshot; without one it
      traps under the head forever (42.5 GB on the TSDB volume,
      2026-07). Weekly recurring snapshot is the fold target. NEVER
      add a snapshot-delete recurring task — it would eat CNPG's CSI
      backup snapshots.
    • *Prometheus page-cache starvation* — mem limit too close to
      RSS leaves no room to cache the TSDB; every query re-reads
      disk, and Longhorn's replica round-robin turns that into
      TB/day of NODE traffic (invisible on Proxmox physical NICs
      between co-located VMs). Keep limit ≫ RSS; relapse signal
      RSS >2.5GB.
