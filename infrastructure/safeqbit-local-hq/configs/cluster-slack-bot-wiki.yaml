      Docker host. Known flap: `wiki cluster.gotchas`.
    _Bot: `alerts` · `silences` · `summary` (digest on demand)._
  cluster.gitops: |
    *GitOps* — how changes actually reach the cluster
    Repo layout:
    ```
    clusters/safeqbit-local-hq/    Flux entry: apps.yaml,
                                   infrastructure-{controllers,configs}.yaml
    infrastructure/.../controllers  platform Helm charts (operators)
    infrastructure/.../configs      CRs that need those operators
    apps/safeqbit-local-hq/<app>/   one folder per app
    ```
    Flow: edit YAML → PR → merge → Flux reconciles (controllers →
    configs → apps ordering via dependsOn).
    • Secrets: `kubeseal` on the laptop → SealedSecret in Git; only
      the in-cluster controller can decrypt. Master key lives offline.
    • Live changes get reverted/stripped — the emergency pattern is
      `flux suspend` → change → fix Git → `flux resume`
      (workbook/maintenance.md).
    • ConfigMap-mounted scripts (reports, bot.py) are read at pod
      START — after merging, delete pods one at a time. (This wiki is
      the exception: read per request, syncs live in ~1 min.)
    • Rebuild from nothing: k3s + this repo + master key — or one
      etcd-from-B2 restore. workbook/node-bootstrap.md.
    _Bot: `/cluster flux`. Triage: `wiki method.flux-sync`._
