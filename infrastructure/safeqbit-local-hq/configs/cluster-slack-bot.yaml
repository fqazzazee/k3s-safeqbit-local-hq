# cluster-slack-bot.yaml
# On-demand cluster queries from Slack: /cluster summary|backups|pods|nodes|alerts
#
# Uses Slack SOCKET MODE: the pod opens an OUTBOUND WebSocket to Slack and
# receives slash commands over it. Nothing is exposed inbound — the cluster
# stays LAN-only. Free-tier Slack feature (app-level token, no subscription).
#
# Design:
#   - `summary` and `backups` run the EXISTING report scripts
#     (cluster-summary-report-script / backup-summary-report-script
#     ConfigMaps, mounted read-only) as subprocesses with SLACK_WEBHOOK_URL
#     pointed at the slash command's response_url — same report, delivered
#     to wherever the command was typed (visible only to the invoker).
#     Zero duplication with the CronJobs.
#   - `pods` / `nodes` hit the K8s API read-only; `alerts` queries Prometheus.
#   - STRICTLY read-only RBAC: a compromised Slack token can look, not touch.
#     No write verbs anywhere, by design — do not add restart/delete commands.
#
# Secret `cluster-slack-bot-tokens` (SealedSecret below) keys:
#   bot-token  (xoxb-…)  app-token (xapp-…)
#   allowed-user-ids     optional comma-separated Slack user IDs; empty/absent
#                        = anyone in the workspace may invoke.
#
# Slack app config (UI-only, recreate from workbook/slack-bot.md):
#   Socket Mode ON, slash command /cluster, bot scope chat:write.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-slack-bot
  namespace: monitoring

---
# Bot's own permissions: pods + nodes, read-only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-slack-bot
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-slack-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-slack-bot
subjects:
  - kind: ServiceAccount
    name: cluster-slack-bot
    namespace: monitoring

---
# The `backups` command runs the backup digest script, which needs the
# same read access the weekly CronJob has — reuse its ClusterRole …
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-slack-bot-backup-report
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backup-summary-report
subjects:
  - kind: ServiceAccount
    name: cluster-slack-bot
    namespace: monitoring

---
# … and its resourceName-scoped read of velero/cloud-credentials (B2 usage).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-slack-bot-b2creds
  namespace: velero
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-summary-report-b2creds
subjects:
  - kind: ServiceAccount
    name: cluster-slack-bot
    namespace: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-slack-bot-script
  namespace: monitoring
data:
  bot.py: |
    #!/usr/bin/env python3
    """Slack Socket Mode bot for on-demand cluster queries (read-only)."""
    import json, os, ssl, subprocess, time, urllib.error, urllib.parse, urllib.request
    from datetime import datetime, timezone

    from slack_bolt import App
    from slack_bolt.adapter.socket_mode import SocketModeHandler

    # Trailing dot = absolute name; survives the cluster's ndots/search-domain
    # quirks under musl (see project DNS notes).
    PROM = os.environ.get(
        "PROM_BASE",
        "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local.:9090")
    APISERVER = (f"https://{os.environ['KUBERNETES_SERVICE_HOST']}"
                 f":{os.environ.get('KUBERNETES_SERVICE_PORT', '443')}")
    SA_DIR = "/var/run/secrets/kubernetes.io/serviceaccount"
    ALLOWED = {u.strip() for u in
               os.environ.get("ALLOWED_SLACK_USER_IDS", "").split(",") if u.strip()}
    NOW = lambda: datetime.now(timezone.utc)

    USAGE = (":robot_face: *cluster bot* — read-only. Usage:\n"
             "• `/cluster summary` — the daily health digest, on demand\n"
             "• `/cluster backups` — the weekly backup digest, on demand (~30s)\n"
             "• `/cluster pods [namespace]` — pod health, all namespaces or one\n"
             "• `/cluster nodes` — node readiness, versions, load\n"
             "• `/cluster alerts` — currently firing Prometheus alerts")

    def k8s(path):
        tok = open(f"{SA_DIR}/token").read()
        ctx = ssl.create_default_context(cafile=f"{SA_DIR}/ca.crt")
        req = urllib.request.Request(f"{APISERVER}{path}",
                                     headers={"Authorization": f"Bearer {tok}"})
        for attempt in range(4):
            try:
                with urllib.request.urlopen(req, timeout=20, context=ctx) as r:
                    return json.load(r)
            except urllib.error.HTTPError as e:
                if e.code in (429, 500, 503) and attempt < 3:
                    time.sleep(2 ** attempt)
                    continue
                raise

    def promq(q):
        url = f"{PROM}/api/v1/query?query={urllib.parse.quote(q, safe='')}"
        with urllib.request.urlopen(url, timeout=30) as r:
            d = json.load(r)
        if d.get("status") != "success":
            raise RuntimeError(f"promql failed: {q[:60]}")
        return d["data"]["result"]

    def post(response_url, text):
        body = json.dumps({"text": text[:39000]}).encode()
        req = urllib.request.Request(response_url, body,
                                     {"Content-Type": "application/json"})
        urllib.request.urlopen(req, timeout=15)

    def age(ts):
        d = NOW() - datetime.fromisoformat(ts.replace("Z", "+00:00"))
        if d.days:
            return f"{d.days}d"
        h = d.seconds // 3600
        return f"{h}h" if h else f"{d.seconds // 60}m"

    # ---------- command implementations ----------

    def run_report(script, label):
        def handler(rurl, args):
            env = dict(os.environ, SLACK_WEBHOOK_URL=rurl)
            r = subprocess.run(["python3", script], env=env,
                               capture_output=True, text=True, timeout=280)
            if r.returncode != 0:
                post(rurl, f":x: {label} report failed:\n"
                           f"```{(r.stderr or r.stdout)[-1200:]}```")
        return handler

    def pod_line(p):
        st = p["status"]
        cs = st.get("containerStatuses", [])
        ready = sum(1 for c in cs if c.get("ready"))
        restarts = sum(c.get("restartCount", 0) for c in cs)
        phase = st.get("phase", "?")
        # Surface the real reason for stuck pods (CrashLoopBackOff etc.)
        for c in cs:
            w = c.get("state", {}).get("waiting")
            if w and w.get("reason"):
                phase = w["reason"]
                break
        r = f" :repeat: {restarts}" if restarts else ""
        return (f"{p['metadata']['name']}  {ready}/{len(cs)}  {phase}"
                f"  {age(p['metadata']['creationTimestamp'])}{r}")

    def pods(rurl, args):
        ns = args[0] if args else None
        path = f"/api/v1/namespaces/{ns}/pods" if ns else "/api/v1/pods"
        items = k8s(path)["items"]
        if not items:
            post(rurl, f":shrug: no pods{' in `' + ns + '`' if ns else ''}")
            return
        healthy = lambda p: (p["status"].get("phase") in ("Running", "Succeeded")
                             and all(c.get("ready") or
                                     c.get("state", {}).get("terminated", {})
                                      .get("reason") == "Completed"
                                     for c in p["status"].get("containerStatuses", [])))
        bad = [p for p in items if not healthy(p)]
        if ns:
            lines = [f":package: *{ns}* — {len(items)} pods, "
                     f"{len(items) - len(bad)} healthy"]
            lines += [("  :warning: " if not healthy(p) else "  :white_check_mark: ")
                      + pod_line(p) for p in items[:80]]
            if len(items) > 80:
                lines.append(f"  … and {len(items) - 80} more")
        else:
            per_ns = {}
            for p in items:
                per_ns.setdefault(p["metadata"]["namespace"], []).append(p)
            lines = [f":package: *{len(items)} pods in {len(per_ns)} namespaces* — "
                     f"{len(items) - len(bad)} healthy, {len(bad)} not"]
            if bad:
                lines.append("*Unhealthy:*")
                lines += [f"  :warning: `{p['metadata']['namespace']}` "
                          + pod_line(p) for p in bad[:40]]
            else:
                lines.append(":white_check_mark: everything is Running/Completed")
            lines.append("_`/cluster pods <namespace>` for a full listing_")
        post(rurl, "\n".join(lines))

    def nodes(rurl, args):
        items = k8s("/api/v1/nodes")["items"]
        load = {}
        try:
            names = {r["metric"]["instance"]: r["metric"]["nodename"]
                     for r in promq("node_uname_info")}
            load = {names.get(r["metric"]["instance"], ""):
                    f' — cpu {float(r["value"][1]):.0f}%'
                    for r in promq('100 * (1 - avg by (instance) '
                                   '(rate(node_cpu_seconds_total{mode="idle"}[10m])))')}
        except Exception:
            pass
        lines = [f":computer: *{len(items)} nodes*"]
        for n in items:
            name = n["metadata"]["name"]
            conds = {c["type"]: c["status"] for c in n["status"]["conditions"]}
            ok = conds.get("Ready") == "True"
            icon = ":white_check_mark:" if ok else ":red_circle:"
            lines.append(f"{icon} *{name}*  "
                         f"{'Ready' if ok else 'NOT READY'}  "
                         f"{n['status']['nodeInfo']['kubeletVersion']}  "
                         f"up {age(n['metadata']['creationTimestamp'])}"
                         f"{load.get(name, '')}")
        post(rurl, "\n".join(lines))

    def alerts(rurl, args):
        res = promq('ALERTS{alertstate="firing"}')
        if not res:
            post(rurl, ":white_check_mark: no alerts firing")
            return
        rank = {"critical": 0, "warning": 1, "info": 2}
        rows = sorted((r["metric"] for r in res),
                      key=lambda m: rank.get(m.get("severity", ""), 3))
        icons = {"critical": ":rotating_light:", "warning": ":warning:",
                 "info": ":information_source:"}
        lines = [f":bell: *{len(rows)} alert(s) firing*"]
        for m in rows[:40]:
            sev = m.get("severity", "?")
            where = m.get("namespace") or m.get("node") or ""
            lines.append(f"{icons.get(sev, ':grey_question:')} "
                         f"*{m.get('alertname', '?')}* ({sev})"
                         f"{'  `' + where + '`' if where else ''}")
        post(rurl, "\n".join(lines))

    HANDLERS = {
        "summary": run_report("/reports/cluster/report.py", "cluster summary"),
        "backups": run_report("/reports/backup/report.py", "backup digest"),
        "pods": pods,
        "nodes": nodes,
        "alerts": alerts,
    }

    app = App(token=os.environ["SLACK_BOT_TOKEN"])

    @app.command("/cluster")
    def cluster_cmd(ack, command):
        args = (command.get("text") or "").split()
        sub = args[0].lower() if args else "help"
        if ALLOWED and command.get("user_id") not in ALLOWED:
            ack(":no_entry: you are not authorized to use this bot")
            return
        if sub not in HANDLERS:
            ack(USAGE)
            return
        # Slack requires the ack within 3s; the real answer follows via
        # response_url (visible only to the invoker).
        ack(f":hourglass_flowing_sand: `{sub}` — gathering data…")
        rurl = command["response_url"]
        try:
            HANDLERS[sub](rurl, args[1:])
        except Exception as e:
            post(rurl, f":x: `{sub}` failed: {type(e).__name__}: {e}")

    if __name__ == "__main__":
        print("cluster-slack-bot starting (socket mode)", flush=True)
        SocketModeHandler(app, os.environ["SLACK_APP_TOKEN"]).start()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-slack-bot
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cluster-slack-bot
spec:
  replicas: 1
  # Single replica + Recreate: two bots = every command answered twice.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-slack-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-slack-bot
    spec:
      serviceAccountName: cluster-slack-bot
      # ndots=1 so external names (slack.com, pypi.org) resolve without the
      # search-domain amplification that breaks musl resolvers.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: bot
          image: python:3.13-alpine
          # slack-bolt is the only non-stdlib dep; installed at start
          # (pinned) rather than maintaining a custom image + registry.
          command: ["/bin/sh", "-c"]
          args:
            - pip install --no-cache-dir --quiet slack-bolt==1.29.0 &&
              exec python3 /bot/bot.py
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster-slack-bot-tokens
                  key: bot-token
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster-slack-bot-tokens
                  key: app-token
            - name: ALLOWED_SLACK_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: cluster-slack-bot-tokens
                  key: allowed-user-ids
                  optional: true
          volumeMounts:
            - name: bot-script
              mountPath: /bot
            - name: cluster-report
              mountPath: /reports/cluster
            - name: backup-report
              mountPath: /reports/backup
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: bot-script
          configMap:
            name: cluster-slack-bot-script
        - name: cluster-report
          configMap:
            name: cluster-summary-report-script
        - name: backup-report
          configMap:
            name: backup-summary-report-script
