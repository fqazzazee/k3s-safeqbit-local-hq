# cluster-slack-bot.yaml
# On-demand cluster queries from Slack:
#   /cluster summary|backups|pods|deploys|nodes|logs|events|top|pvcs|ingresses|alerts
#
# Uses Slack SOCKET MODE: the pod opens an OUTBOUND WebSocket to Slack and
# receives slash commands over it. Nothing is exposed inbound — the cluster
# stays LAN-only. Free-tier Slack feature (app-level token, no subscription).
#
# Design:
#   - `summary` and `backups` run the EXISTING report scripts
#     (cluster-summary-report-script / backup-summary-report-script
#     ConfigMaps, mounted read-only) as subprocesses with SLACK_WEBHOOK_URL
#     pointed at the slash command's response_url — same report, delivered
#     to wherever the command was typed (visible only to the invoker).
#     Zero duplication with the CronJobs.
#   - The kubectl-style commands hit the K8s API read-only; `alerts` and
#     `top` query Prometheus.
#   - STRICTLY read-only RBAC: a compromised Slack token can look, not touch.
#     No write verbs anywhere, by design — do not add restart/delete commands.
#   - `logs` ships pod log tails into Slack (ephemeral, invoker-only, but
#     Slack-hosted) — keep that in mind for apps that log secrets.
#
# Secret `cluster-slack-bot-tokens` (SealedSecret in
# cluster-slack-bot-tokens.yaml) keys:
#   bot-token  (xoxb-…)  app-token (xapp-…)
#   allowed-user-ids     optional comma-separated Slack user IDs; empty/absent
#                        = anyone in the workspace may invoke.
#
# Slack app config (UI-only, recreate from workbook/slack-bot.md):
#   Socket Mode ON, slash command /cluster, bot scope chat:write.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-slack-bot
  namespace: monitoring

---
# Bot's own permissions — read-only, no write verbs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-slack-bot
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "events", "persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-slack-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-slack-bot
subjects:
  - kind: ServiceAccount
    name: cluster-slack-bot
    namespace: monitoring

---
# The `backups` command runs the backup digest script, which needs the
# same read access the weekly CronJob has — reuse its ClusterRole …
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-slack-bot-backup-report
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backup-summary-report
subjects:
  - kind: ServiceAccount
    name: cluster-slack-bot
    namespace: monitoring

---
# … and its resourceName-scoped read of velero/cloud-credentials (B2 usage).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-slack-bot-b2creds
  namespace: velero
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-summary-report-b2creds
subjects:
  - kind: ServiceAccount
    name: cluster-slack-bot
    namespace: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-slack-bot-script
  namespace: monitoring
data:
  bot.py: |
    #!/usr/bin/env python3
    """Slack Socket Mode bot for on-demand cluster queries (read-only)."""
    import json, os, ssl, subprocess, time, urllib.error, urllib.parse, urllib.request
    from datetime import datetime, timezone

    from slack_bolt import App
    from slack_bolt.adapter.socket_mode import SocketModeHandler

    # Trailing dot = absolute name; survives the cluster's ndots/search-domain
    # quirks under musl (see project DNS notes).
    PROM = os.environ.get(
        "PROM_BASE",
        "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local.:9090")
    APISERVER = (f"https://{os.environ['KUBERNETES_SERVICE_HOST']}"
                 f":{os.environ.get('KUBERNETES_SERVICE_PORT', '443')}")
    SA_DIR = "/var/run/secrets/kubernetes.io/serviceaccount"
    ALLOWED = {u.strip() for u in
               os.environ.get("ALLOWED_SLACK_USER_IDS", "").split(",") if u.strip()}
    NOW = lambda: datetime.now(timezone.utc)

    USAGE = "\n".join([
        ":robot_face: *cluster bot* — read-only. Each command with the kubectl you'd type:",
        "",
        ":bar_chart: `/cluster summary` — daily health digest, on demand",
        ":floppy_disk: `/cluster backups` — weekly backup digest (~30s, lists B2)",
        ":package: `/cluster pods [ns]` — pod health · `kubectl get pods -A` / `-n <ns>`",
        ":rocket: `/cluster deploys [ns]` — deployments/statefulsets/daemonsets · `kubectl get deploy,sts,ds -A`",
        ":computer: `/cluster nodes` — readiness, version, CPU · `kubectl get nodes -o wide`",
        ":scroll: `/cluster logs <ns> <pod> [container] [lines]` — log tail, pod prefix ok · `kubectl logs -n <ns> <pod> --tail=30`",
        ":zap: `/cluster events [ns]` — recent Warning events · `kubectl get events -A --field-selector type!=Normal`",
        ":fire: `/cluster top [ns]` — top CPU/memory pods · `kubectl top pods -A`",
        ":minidisc: `/cluster pvcs [ns]` — volume claims · `kubectl get pvc -A`",
        ":globe_with_meridians: `/cluster ingresses` — hostname → service map · `kubectl get ingress -A`",
        ":bell: `/cluster alerts` — firing Prometheus alerts",
        ":question: `/cluster help` — this list",
    ])

    def k8s_raw(path, timeout=30):
        tok = open(f"{SA_DIR}/token").read()
        ctx = ssl.create_default_context(cafile=f"{SA_DIR}/ca.crt")
        req = urllib.request.Request(f"{APISERVER}{path}",
                                     headers={"Authorization": f"Bearer {tok}"})
        for attempt in range(4):
            try:
                with urllib.request.urlopen(req, timeout=timeout, context=ctx) as r:
                    return r.read().decode(errors="replace")
            except urllib.error.HTTPError as e:
                if e.code in (429, 500, 503) and attempt < 3:
                    time.sleep(2 ** attempt)
                    continue
                raise

    def k8s(path):
        return json.loads(k8s_raw(path))

    def promq(q):
        url = f"{PROM}/api/v1/query?query={urllib.parse.quote(q, safe='')}"
        with urllib.request.urlopen(url, timeout=30) as r:
            d = json.load(r)
        if d.get("status") != "success":
            raise RuntimeError(f"promql failed: {q[:60]}")
        return d["data"]["result"]

    def post(response_url, text):
        body = json.dumps({"text": text[:39000]}).encode()
        req = urllib.request.Request(response_url, body,
                                     {"Content-Type": "application/json"})
        urllib.request.urlopen(req, timeout=15)

    def ts(s):
        try:
            return datetime.fromisoformat(s.replace("Z", "+00:00"))
        except Exception:
            return datetime.fromtimestamp(0, timezone.utc)

    def age(s):
        d = NOW() - ts(s)
        if d.days:
            return f"{d.days}d"
        h = d.seconds // 3600
        return f"{h}h" if h else f"{d.seconds // 60}m"

    def human(n):
        for unit in ("B", "KiB", "MiB", "GiB", "TiB"):
            if abs(n) < 1024 or unit == "TiB":
                return f"{n:,.0f} {unit}" if unit == "B" else f"{n:.1f} {unit}"
            n /= 1024

    # ---------- command implementations ----------

    def run_report(script, label):
        def handler(rurl, args):
            env = dict(os.environ, SLACK_WEBHOOK_URL=rurl)
            r = subprocess.run(["python3", script], env=env,
                               capture_output=True, text=True, timeout=280)
            if r.returncode != 0:
                post(rurl, f":x: {label} report failed:\n"
                           f"```{(r.stderr or r.stdout)[-1200:]}```")
        return handler

    def pod_line(p):
        st = p["status"]
        cs = st.get("containerStatuses", [])
        ready = sum(1 for c in cs if c.get("ready"))
        restarts = sum(c.get("restartCount", 0) for c in cs)
        phase = st.get("phase", "?")
        # Surface the real reason for stuck pods (CrashLoopBackOff etc.)
        for c in cs:
            w = c.get("state", {}).get("waiting")
            if w and w.get("reason"):
                phase = w["reason"]
                break
        r = f" :repeat: {restarts}" if restarts else ""
        return (f"{p['metadata']['name']}  {ready}/{len(cs)}  {phase}"
                f"  {age(p['metadata']['creationTimestamp'])}{r}")

    def healthy(p):
        return (p["status"].get("phase") in ("Running", "Succeeded")
                and all(c.get("ready") or
                        c.get("state", {}).get("terminated", {})
                         .get("reason") == "Completed"
                        for c in p["status"].get("containerStatuses", [])))

    def pods(rurl, args):
        ns = args[0] if args else None
        path = f"/api/v1/namespaces/{ns}/pods" if ns else "/api/v1/pods"
        items = k8s(path)["items"]
        if not items:
            post(rurl, f":shrug: no pods{' in `' + ns + '`' if ns else ''}")
            return
        bad = [p for p in items if not healthy(p)]
        if ns:
            lines = [f":package: *{ns}* — {len(items)} pods, "
                     f"{len(items) - len(bad)} healthy"]
            lines += [("  :warning: " if not healthy(p) else "  :white_check_mark: ")
                      + pod_line(p) for p in items[:80]]
            if len(items) > 80:
                lines.append(f"  … and {len(items) - 80} more")
        else:
            per_ns = {}
            for p in items:
                per_ns.setdefault(p["metadata"]["namespace"], []).append(p)
            lines = [f":package: *{len(items)} pods in {len(per_ns)} namespaces* — "
                     f"{len(items) - len(bad)} healthy, {len(bad)} not"]
            if bad:
                lines.append("*Unhealthy:*")
                lines += [f"  :warning: `{p['metadata']['namespace']}` "
                          + pod_line(p) for p in bad[:40]]
            else:
                lines.append(":white_check_mark: everything is Running/Completed")
            lines.append("_`/cluster pods <namespace>` for a full listing_")
        post(rurl, "\n".join(lines))

    def deploys(rurl, args):
        ns = args[0] if args else None
        base = f"/apis/apps/v1/namespaces/{ns}" if ns else "/apis/apps/v1"
        out = []
        kinds = [("deployments", ":rocket:", "Deployments"),
                 ("statefulsets", ":moyai:", "StatefulSets"),
                 ("daemonsets", ":busts_in_silhouette:", "DaemonSets")]
        for res, icon, title in kinds:
            items = k8s(f"{base}/{res}")["items"]
            if not items:
                continue
            rows = []
            for d in items:
                st, meta = d.get("status", {}), d["metadata"]
                if res == "daemonsets":
                    ready, want = st.get("numberReady", 0), st.get("desiredNumberScheduled", 0)
                else:
                    ready, want = st.get("readyReplicas", 0) or 0, d["spec"].get("replicas", 0)
                ok = ready == want and want > 0
                mark = ":white_check_mark:" if ok else (
                    ":red_circle:" if ready == 0 else ":warning:")
                rows.append((not ok, meta["namespace"], meta["name"],
                             f"{mark} `{meta['namespace']}` *{meta['name']}*  "
                             f"{ready}/{want}  {age(meta['creationTimestamp'])}"))
            rows.sort()          # unhealthy first, then ns/name
            rows.sort(key=lambda r: not r[0])
            out.append(f"{icon} *{title}* ({len(items)})")
            out += [r[3] for r in rows[:60]]
        post(rurl, "\n".join(out) if out else ":shrug: nothing found")

    def nodes(rurl, args):
        items = k8s("/api/v1/nodes")["items"]
        load = {}
        try:
            names = {r["metric"]["instance"]: r["metric"]["nodename"]
                     for r in promq("node_uname_info")}
            load = {names.get(r["metric"]["instance"], ""):
                    f' — :fire: cpu {float(r["value"][1]):.0f}%'
                    for r in promq('100 * (1 - avg by (instance) '
                                   '(rate(node_cpu_seconds_total{mode="idle"}[10m])))')}
        except Exception:
            pass
        lines = [f":computer: *{len(items)} nodes*"]
        for n in items:
            name = n["metadata"]["name"]
            conds = {c["type"]: c["status"] for c in n["status"]["conditions"]}
            ok = conds.get("Ready") == "True"
            icon = ":white_check_mark:" if ok else ":red_circle:"
            lines.append(f"{icon} *{name}*  "
                         f"{'Ready' if ok else 'NOT READY'}  "
                         f"{n['status']['nodeInfo']['kubeletVersion']}  "
                         f"up {age(n['metadata']['creationTimestamp'])}"
                         f"{load.get(name, '')}")
        post(rurl, "\n".join(lines))

    def logs(rurl, args):
        if len(args) < 2:
            post(rurl, ":scroll: usage: `/cluster logs <namespace> <pod> "
                       "[container] [lines]` — pod name prefix is enough")
            return
        ns, name = args[0], args[1]
        container, lines_n = None, 30
        for a in args[2:]:
            if a.isdigit():
                lines_n = min(int(a), 200)
            else:
                container = a
        all_pods = k8s(f"/api/v1/namespaces/{ns}/pods")["items"]
        names = [p["metadata"]["name"] for p in all_pods]
        if name not in names:
            matches = [n for n in names if n.startswith(name)]
            if len(matches) == 1:
                name = matches[0]
            elif matches:
                post(rurl, ":mag: several matches — be more specific:\n" +
                     "\n".join(f"• `{m}`" for m in matches[:20]))
                return
            else:
                post(rurl, f":shrug: no pod `{name}*` in `{ns}`")
                return
        pod = next(p for p in all_pods if p["metadata"]["name"] == name)
        containers = [c["name"] for c in pod["spec"]["containers"]]
        if not container:
            if len(containers) > 1:
                post(rurl, f":scroll: `{name}` has several containers — pick one:\n" +
                     "\n".join(f"• `/cluster logs {ns} {name} {c}`"
                               for c in containers))
                return
            container = containers[0]
        q = urllib.parse.urlencode(
            {"container": container, "tailLines": lines_n, "timestamps": "true"})
        text = k8s_raw(f"/api/v1/namespaces/{ns}/pods/{name}/log?{q}") or ""
        if not text.strip():
            text = "(no output)"
        if len(text) > 11000:
            text = "…(truncated)…\n" + text[-11000:]
        post(rurl, f":scroll: *{ns}/{name}* `{container}` — last {lines_n} lines\n"
                   f"```{text}```")

    def events(rurl, args):
        ns = args[0] if args else None
        path = (f"/api/v1/namespaces/{ns}/events" if ns
                else "/api/v1/events") + "?limit=500"
        items = k8s(path)["items"]
        warn = [e for e in items if e.get("type") != "Normal"]
        when = lambda e: (e.get("lastTimestamp") or e.get("eventTime")
                          or e["metadata"]["creationTimestamp"] or "")
        warn.sort(key=lambda e: ts(when(e)), reverse=True)
        if not warn:
            post(rurl, ":white_check_mark: no Warning events"
                       f"{' in `' + ns + '`' if ns else ''}")
            return
        lines = [f":zap: *{len(warn)} Warning event(s)*"
                 f"{' in `' + ns + '`' if ns else ''} — newest first"]
        for e in warn[:25]:
            obj = e.get("involvedObject", {})
            cnt = e.get("count") or 1
            lines.append(
                f":warning: `{obj.get('namespace', '-')}` "
                f"*{e.get('reason', '?')}* {obj.get('kind', '?')}/"
                f"{obj.get('name', '?')}"
                f"{f' ×{cnt}' if cnt > 1 else ''} ({age(when(e))} ago)\n"
                f"        _{(e.get('message') or '').strip()[:160]}_")
        post(rurl, "\n".join(lines))

    def top(rurl, args):
        nsf = f'namespace="{args[0]}",' if args else ""
        cpu = promq(f'topk(10, sum by (namespace, pod) '
                    f'(rate(container_cpu_usage_seconds_total'
                    f'{{{nsf}container!="",pod!=""}}[5m])))')
        mem = promq(f'topk(10, sum by (namespace, pod) '
                    f'(container_memory_working_set_bytes'
                    f'{{{nsf}container!="",pod!=""}}))')
        lines = [f":fire: *Top CPU* (cores, 5m avg)"
                 f"{' in `' + args[0] + '`' if args else ''}"]
        lines += [f"  :hot_pepper: `{r['metric']['namespace']}/{r['metric']['pod']}`"
                  f"  {float(r['value'][1]):.2f}"
                  for r in sorted(cpu, key=lambda r: -float(r["value"][1]))]
        lines.append(":brain: *Top memory* (working set)")
        lines += [f"  :package: `{r['metric']['namespace']}/{r['metric']['pod']}`"
                  f"  {human(float(r['value'][1]))}"
                  for r in sorted(mem, key=lambda r: -float(r["value"][1]))]
        post(rurl, "\n".join(lines))

    def pvcs(rurl, args):
        ns = args[0] if args else None
        path = (f"/api/v1/namespaces/{ns}/persistentvolumeclaims" if ns
                else "/api/v1/persistentvolumeclaims")
        items = k8s(path)["items"]
        if not items:
            post(rurl, ":shrug: no PVCs found")
            return
        icons = {"Bound": ":white_check_mark:", "Pending": ":hourglass:",
                 "Lost": ":red_circle:"}
        lines = [f":minidisc: *{len(items)} PVCs*"]
        for p in sorted(items, key=lambda p: (p["metadata"]["namespace"],
                                              p["metadata"]["name"])):
            phase = p["status"].get("phase", "?")
            cap = p["status"].get("capacity", {}).get(
                "storage", p["spec"]["resources"]["requests"].get("storage", "?"))
            sc = p["spec"].get("storageClassName") or "(static)"
            lines.append(f"{icons.get(phase, ':grey_question:')} "
                         f"`{p['metadata']['namespace']}` "
                         f"*{p['metadata']['name']}*  {cap}  _{sc}_")
        post(rurl, "\n".join(lines[:120]))

    def ingresses(rurl, args):
        items = k8s("/apis/networking.k8s.io/v1/ingresses")["items"]
        rows = []
        for i in items:
            ns = i["metadata"]["namespace"]
            for rule in i["spec"].get("rules", []):
                host = rule.get("host", "*")
                paths = rule.get("http", {}).get("paths", [])
                svc = (paths[0].get("backend", {}).get("service", {})
                       if paths else {})
                rows.append((host, f":globe_with_meridians: `https://{host}"
                             f"{paths[0].get('path', '') if paths else ''}` → "
                             f"`{ns}/{svc.get('name', '?')}`"))
        rows.sort()
        post(rurl, f":globe_with_meridians: *{len(rows)} ingress routes*\n"
                   + "\n".join(r[1] for r in rows[:80]))

    def alerts(rurl, args):
        res = promq('ALERTS{alertstate="firing"}')
        if not res:
            post(rurl, ":white_check_mark: no alerts firing")
            return
        rank = {"critical": 0, "warning": 1, "info": 2}
        rows = sorted((r["metric"] for r in res),
                      key=lambda m: rank.get(m.get("severity", ""), 3))
        icons = {"critical": ":rotating_light:", "warning": ":warning:",
                 "info": ":information_source:"}
        lines = [f":bell: *{len(rows)} alert(s) firing*"]
        for m in rows[:40]:
            sev = m.get("severity", "?")
            where = m.get("namespace") or m.get("node") or ""
            lines.append(f"{icons.get(sev, ':grey_question:')} "
                         f"*{m.get('alertname', '?')}* ({sev})"
                         f"{'  `' + where + '`' if where else ''}")
        post(rurl, "\n".join(lines))

    HANDLERS = {
        "summary": run_report("/reports/cluster/report.py", "cluster summary"),
        "backups": run_report("/reports/backup/report.py", "backup digest"),
        "pods": pods,
        "deploys": deploys,
        "nodes": nodes,
        "logs": logs,
        "events": events,
        "top": top,
        "pvcs": pvcs,
        "ingresses": ingresses,
        "alerts": alerts,
    }
    ALIASES = {"deploy": "deploys", "deployments": "deploys", "log": "logs",
               "event": "events", "pvc": "pvcs", "ingress": "ingresses",
               "backup": "backups", "pod": "pods", "node": "nodes",
               "alert": "alerts", "commands": "help", "list": "help"}

    app = App(token=os.environ["SLACK_BOT_TOKEN"])

    @app.command("/cluster")
    def cluster_cmd(ack, command):
        args = (command.get("text") or "").split()
        sub = args[0].lower() if args else "help"
        sub = ALIASES.get(sub, sub)
        if ALLOWED and command.get("user_id") not in ALLOWED:
            ack(":no_entry: you are not authorized to use this bot")
            return
        if sub not in HANDLERS:
            ack(USAGE)
            return
        # Slack requires the ack within 3s; the real answer follows via
        # response_url (visible only to the invoker).
        ack(f":hourglass_flowing_sand: `{sub}` — gathering data…")
        rurl = command["response_url"]
        try:
            HANDLERS[sub](rurl, args[1:])
        except Exception as e:
            post(rurl, f":x: `{sub}` failed: {type(e).__name__}: {e}")

    if __name__ == "__main__":
        print("cluster-slack-bot starting (socket mode)", flush=True)
        SocketModeHandler(app, os.environ["SLACK_APP_TOKEN"]).start()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-slack-bot
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cluster-slack-bot
spec:
  replicas: 1
  # Single replica + Recreate: two bots = every command answered twice.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-slack-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-slack-bot
    spec:
      serviceAccountName: cluster-slack-bot
      # ndots=1 so external names (slack.com, pypi.org) resolve without the
      # search-domain amplification that breaks musl resolvers.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: bot
          image: python:3.13-alpine
          # slack-bolt is the only non-stdlib dep; installed at start
          # (pinned) rather than maintaining a custom image + registry.
          command: ["/bin/sh", "-c"]
          args:
            - pip install --no-cache-dir --quiet slack-bolt==1.29.0 &&
              exec python3 /bot/bot.py
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster-slack-bot-tokens
                  key: bot-token
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster-slack-bot-tokens
                  key: app-token
            - name: ALLOWED_SLACK_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: cluster-slack-bot-tokens
                  key: allowed-user-ids
                  optional: true
          volumeMounts:
            - name: bot-script
              mountPath: /bot
            - name: cluster-report
              mountPath: /reports/cluster
            - name: backup-report
              mountPath: /reports/backup
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: bot-script
          configMap:
            name: cluster-slack-bot-script
        - name: cluster-report
          configMap:
            name: cluster-summary-report-script
