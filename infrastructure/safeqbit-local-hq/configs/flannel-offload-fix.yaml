# flannel-offload-fix.yaml
# Self-healing fix for the Proxmox virtio_net flannel.1 checksum-offload bug.
#
# THE BUG: on these Proxmox `virtio_net` VMs, the flannel VXLAN interface
# `flannel.1` can come up with `tx-checksum-ip-generic: on`. That corrupts the
# inner checksums of TCP/UDP carried over VXLAN; the receiving node silently
# drops the bad packets. ICMP still works (ping deceives you), but pod→ClusterIP
# and pod→remote-pod TCP/UDP across nodes time out. DNS is the loudest victim:
# with a single CoreDNS pod, its UDP replies to off-node clients get dropped, so
# pods on other nodes see intermittent/total resolution failures.
#
# HOW WE HIT IT (2026-06-30): the Pulse k8s agent flapped on/off in the
# dashboard. Root cause was this exact bug — the agent re-resolves the Pulse
# server's Service DNS name to report; when resolution failed the cluster
# vanished, when it recovered it reappeared. Direct pod-IP/ClusterIP worked;
# only Service-DNS-by-name flaked. See workbook/maintenance.md.
#
# WHY A DAEMONSET (not just the systemd unit): a persistent
# `flannel-fix-offload.service` exists on the nodes (BindsTo=k3s.service), but it
# did not survive the most recent reboot. This DaemonSet is the GitOps-native,
# self-healing version: it runs on every node (incl. new ones), re-checks every
# 60s, and re-applies the fix within a minute of `flannel.1` being recreated
# (k3s restart, flannel reload, reboot). The two mechanisms are both idempotent
# and harmless together.
#
# SAFETY: it only ever sets ONE NIC offload flag to `off` on `flannel.1`. No
# other host changes. Needs hostNetwork (to see flannel.1 in the host netns) and
# privileged (ethtool -K toggles a device offload). Standard node-tuning shape.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flannel-offload-fix
  namespace: kube-system
  labels:
    app.kubernetes.io/name: flannel-offload-fix
    app.kubernetes.io/component: node-network-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: flannel-offload-fix
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flannel-offload-fix
        app.kubernetes.io/component: node-network-tuning
    spec:
      hostNetwork: true
      # Keep it alive through node pressure — it guards the cluster network path.
      priorityClassName: system-node-critical
      # Run on EVERY node, including control-plane / tainted nodes.
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      containers:
        - name: fix
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              IFACE=flannel.1
              # ethtool isn't in base alpine; install it (host network → host DNS,
              # independent of the broken cluster DNS path this fix repairs).
              while ! command -v ethtool >/dev/null 2>&1; do
                apk add --no-cache ethtool >/dev/null 2>&1 || {
                  echo "$(date) waiting to install ethtool (no egress yet?)"; sleep 10; }
              done
              echo "$(date) ethtool ready; watching $IFACE tx-checksum-ip-generic"
              while true; do
                if ip link show "$IFACE" >/dev/null 2>&1; then
                  cur=$(ethtool -k "$IFACE" 2>/dev/null | awk '/^tx-checksum-ip-generic:/{print $2}')
                  if [ "$cur" != "off" ]; then
                    if ethtool -K "$IFACE" tx-checksum-ip-generic off 2>/dev/null; then
                      echo "$(date) FIXED $IFACE tx-checksum-ip-generic: ${cur:-unknown} -> off"
                    else
                      echo "$(date) FAILED to set offload on $IFACE (cur=${cur:-unknown})"
                    fi
                  fi
                fi
                sleep 60
              done
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
