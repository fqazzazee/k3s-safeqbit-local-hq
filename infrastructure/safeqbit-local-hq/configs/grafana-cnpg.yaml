# grafana-cnpg.yaml
# CNPG Cluster for Grafana's internal database.
#
# Grafana 13 ships with an embedded "unified storage" system that runs
# background jobs against its database every 30s (dashboard cleanup, secret
# lease management, resource sync). Combined with NFS-backed SQLite this
# causes guaranteed SQLITE_BUSY deadlocks under any sustained load.
# PostgreSQL handles concurrent connections without file-level locking.
#
# All dashboards and datasources are provisioned from ConfigMaps via the
# grafana-sc sidecars, so no data migration from SQLite is needed — Grafana
# initialises the schema on first boot.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-cnpg
  namespace: monitoring
spec:
  # instances: 2 — primary + 1 standby. Grafana goes down without its DB; a
  # second instance reduces recovery time from "minutes to pg_basebackup" to
  # "seconds to failover". Cost: a second 5Gi PVC.
  instances: 2

  bootstrap:
    initdb:
      database: grafana
      owner: grafana

  storage:
    storageClass: longhorn
    size: 5Gi

  backup:
    volumeSnapshot:
      className: longhorn-velero
      snapshotOwnerReference: backup

  affinity:
    topologyKey: kubernetes.io/hostname

  monitoring:
    enablePodMonitor: true
