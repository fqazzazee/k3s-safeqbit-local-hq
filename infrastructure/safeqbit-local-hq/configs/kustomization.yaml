# infrastructure/safeqbit-local-hq/configs/kustomization.yaml
# Lists every config-tier resource. These all depend on at least one controller
# from the controllers/ directory being installed first. The Flux Kustomization
# in clusters/safeqbit-local-hq/infrastructure-configs.yaml uses dependsOn
# to enforce that ordering.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - metallb-pools.yaml
  # Added in subsequent parts:
  - cert-manager-cloudflare.yaml
  - cert-manager-issuers.yaml
  - grafana-admin.yaml
  - velero-cloud-credentials.yaml
  - velero-volume-snapshot-class.yaml
  - velero-schedule-vaultwarden.yaml
  - grafana-cnpg.yaml
  - grafana-cnpg-scheduled-backup.yaml
  - velero-schedule-netbox.yaml
  - velero-schedule-authentik.yaml
  - velero-schedule-affine.yaml
  - velero-schedule-monitoring.yaml
  - velero-schedule-passzilla.yaml
  - velero-schedule-photoprism.yaml
  - pdbs.yaml
  - alertmanager-slack.yaml
  - cnpg-backup-retention.yaml
