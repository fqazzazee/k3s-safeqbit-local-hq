# monitoring-alert-rules.yaml
# Custom PrometheusRule for the three subsystems where 2026-05-27 incidents
# originated and where kube-prometheus-stack has zero default coverage:
# Longhorn, CNPG, Velero.
#
# Prometheus picks this up via `release: monitoring` (Prometheus CR
# ruleSelector). Alerts route through alertmanager-slack (configs/
# alertmanager-slack.yaml) to the Slack channel webhook.
#
# Metric names verified against live Prometheus on 2026-05-29.
# - longhorn_volume_robustness has labels: pvc, pvc_namespace, volume, node,
#   state (one of healthy/degraded/faulted/unknown — only one is 1 at a time)
# - longhorn_snapshot_actual_size_bytes — count() per volume gives snapshot count
# - longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes
#   — PHYSICAL disk used / total (not scheduling)
# - longhorn_node_storage_scheduled_bytes / ..._reservation_bytes — SCHEDULING
#   dimension: sum of replica sizes / reserved. Limit (at over-provisioning
#   100%) = capacity - reservation. Verified live 2026-06-28.
# - cnpg_pg_replication_lag — seconds, per-pod
# - cnpg_collector_up — 1 if exporter scraping postgres OK
# - velero_backup_last_status{schedule=...} — 1 success, 0 failed. NOTE: reads
#   1 for PartiallyFailed too, so it does NOT catch partial failures.
# - velero_backup_failure_total{schedule=...} — counter (full failures)
# - velero_backup_partial_failure_total{schedule=...} — counter, increments on
#   PartiallyFailed (catches the silent data-not-backed-up case)

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: safeqbit-storage-and-backup
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: longhorn
      interval: 1m
      rules:
        - alert: LonghornVolumeDegraded
          expr: longhorn_volume_robustness{state="degraded"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} degraded"
            description: "Volume {{ $labels.volume }} ({{ $labels.pvc_namespace }}/{{ $labels.pvc }}) on node {{ $labels.node }} has been degraded for >10m. A replica is missing or rebuilding."

        - alert: LonghornVolumeFaulted
          expr: longhorn_volume_robustness{state="faulted"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} FAULTED"
            description: "Volume {{ $labels.volume }} ({{ $labels.pvc_namespace }}/{{ $labels.pvc }}) is faulted — all replicas unavailable. Data access is broken until intervention."

        - alert: LonghornVolumeSnapshotCountHigh
          expr: count by (volume) (longhorn_snapshot_actual_size_bytes) > 200
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} approaching snapshot cap"
            description: "Volume {{ $labels.volume }} has {{ $value }} snapshots. Longhorn's per-volume cap is 250. Prune CNPG Backup CRs or Longhorn snapshots before hitting the limit (which blocks all new snapshots, including those Velero needs)."

        - alert: LonghornNodeStorageLow
          expr: longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes > 0.85
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} >85% full"
            description: "Node {{ $labels.node }} Longhorn storage at {{ $value | humanizePercentage }} (physical). Approaching disk capacity — physical space is running out."

        - alert: LonghornNodeSchedulingCeiling
          # 2026-06-28 incident: physical usage was only ~63% (so the alert
          # above never fired), but *scheduled* capacity (sum of replica sizes)
          # hit the over-provisioning limit -> ReplicaSchedulingFailure, which
          # silently broke EVERY Velero data-mover backup (their temp restore
          # volumes couldn't place) and blocked PVC expansion. This watches the
          # scheduling dimension the physical alert misses.
          # With storageOverProvisioningPercentage=100 the schedulable limit is
          # (capacity - reservation). If that setting is raised above 100,
          # multiply the denominator by (percentage / 100).
          expr: longhorn_node_storage_scheduled_bytes / (longhorn_node_storage_capacity_bytes - longhorn_node_storage_reservation_bytes) > 0.85
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} scheduling near over-provisioning limit"
            description: "Node {{ $labels.node }} has {{ $value | humanizePercentage }} of its schedulable capacity reserved by volume replicas. Near 100%, new/expanded volumes and Velero data-mover temp volumes fail to schedule. Grow the sdb disk or reclaim volumes."

    - name: cnpg
      interval: 1m
      rules:
        - alert: CNPGReplicationLagHigh
          expr: cnpg_pg_replication_lag > 300
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "CNPG replica {{ $labels.pod }} lagging"
            description: "Replication lag on {{ $labels.namespace }}/{{ $labels.pod }} is {{ $value }}s (>5m). Standby may be falling behind primary; check for I/O bottleneck or network issue."

        - alert: CNPGExporterDown
          expr: cnpg_collector_up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "CNPG postgres exporter down on {{ $labels.pod }}"
            description: "Cannot scrape postgres metrics from {{ $labels.namespace }}/{{ $labels.pod }} (cluster {{ $labels.cluster }}) for >5m. Postgres may be stopped or unreachable."

    - name: velero
      interval: 1m
      rules:
        - alert: VeleroBackupFailed
          expr: velero_backup_last_status{schedule!=""} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Velero schedule {{ $labels.schedule }} latest backup failed"
            description: "Latest backup for schedule {{ $labels.schedule }} reported FAILED. Check `velero backup describe <name>` and the corresponding BackupRepository in namespace velero."

        - alert: VeleroBackupFailureRateHigh
          expr: increase(velero_backup_failure_total{schedule!=""}[24h]) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Velero schedule {{ $labels.schedule }} has >2 failures in 24h"
            description: "Schedule {{ $labels.schedule }} has accumulated {{ $value }} backup failures in the last 24h. Likely a persistent issue (BSL unreachable, B2 caps hit, or kopia maintain failing)."

        - alert: VeleroBackupPartiallyFailed
          # velero_backup_last_status reports 1 (success) even for a
          # PartiallyFailed backup, so VeleroBackupFailed (== 0) never catches
          # them. monitoring-bimonthly's kopia repo was broken for ~6 weeks this
          # way (every DataUpload failed -> PartiallyFailed -> volume data NOT
          # backed up, but no alert). The partial-failure counter increments on
          # each bad run; watch a window longer than the slowest cadence
          # (bimonthly ~15d) so a single bad run is caught before the next one.
          #
          # SELF-HEALING: `unless on(schedule) (a full success within 16d)`.
          # A bare counter would keep firing for the full 16d even after the
          # schedule recovered (counters don't decrement). Suppressing once
          # velero_backup_last_successful_timestamp is fresh makes the alert
          # clear automatically on the schedule's next successful run, while a
          # never-succeeded schedule (timestamp absent, e.g. monitoring after
          # the outage) keeps firing until it does. Deleted-schedule metrics
          # linger ~16d then age out (cleared sooner by a velero pod restart).
          expr: |
            (increase(velero_backup_partial_failure_total{schedule!=""}[16d]) > 0)
            unless on(schedule)
            ((time() - velero_backup_last_successful_timestamp) < 16 * 86400)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Velero schedule {{ $labels.schedule }} partially failed (no full success since)"
            description: "Schedule {{ $labels.schedule }} had a PartiallyFailed backup in the last 16d and has not had a fully successful backup since — volume data was likely NOT captured. Check its DataUploads and BackupRepository in namespace velero. Clears automatically once a backup fully succeeds."
