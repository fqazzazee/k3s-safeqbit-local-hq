# velero-schedule-affine.yaml
# Weekly Velero backup of the affine namespace to B2.
#
# Covers: affine-storage PVC (blobs, avatars, 15MB+), affine-config PVC
# (private.key), SealedSecret, PVC definitions, Ingress, Deployments.
#
# Postgres data is NOT in this backup — CNPG ScheduledBackup handles that
# separately (apps/.../affine/04-cnpg-scheduled-backup.yaml). Velero excludes
# pods globally and won't snapshot the cnpg PVC since no non-pod object
# directly claims it.
#
# Schedule: Sundays 03:00 UTC (1h after CNPG snapshot at 02:00)
# Retention: 180 days (~26 weekly restore points at steady state)

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: affine-weekly
  namespace: velero
spec:
  schedule: "0 3 * * 0"

  template:
    ttl: "4320h0m0s"   # 180 days
    includedNamespaces:
      - affine
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
