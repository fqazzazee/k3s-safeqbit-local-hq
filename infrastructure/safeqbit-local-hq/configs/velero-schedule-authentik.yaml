# velero-schedule-authentik.yaml
# Bi-monthly Velero backup of the authentik namespace to B2.
#
# Postgres data handled separately by CNPG ScheduledBackup (weekly).
# This catches the k8s objects (Ingress, SealedSecret, HelmRelease state,
# etc). authentik-media/-templates are NFS and skipped by the volume
# policy — TrueNAS protects them.
#
# Schedule: 5th and 20th 03:00 UTC. Spread across the month with other
# bi-monthly workloads so only one fires per day (avoids B2 cap spikes).
# Retention: 90 days (tuned down from 180d, 2026-07-03)

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: authentik-bimonthly
  namespace: velero
spec:
  schedule: "0 3 5,20 * *"

  template:
    ttl: "2160h0m0s"   # 90 days
    includedNamespaces:
      - authentik
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
      # One-shot ACME workflow objects. Restoring these plants a stale
      # CertificateRequest that squats on the name cert-manager needs for the
      # next renewal, silently stalling it (vaultwarden-tls, 2026-07-18).
      - certificaterequests.cert-manager.io
      - orders.acme.cert-manager.io
      - challenges.acme.cert-manager.io
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
