# velero-schedule-guacamole.yaml
# Bi-monthly Velero backup of the guacamole namespace to B2.
#
# Postgres data handled separately by CNPG ScheduledBackup (weekly).
# This catches the k8s objects (Ingress, ConfigMap, Deployments, Services,
# PVC defs). guacamole-recordings is NFS and skipped by the volume policy —
# TrueNAS protects the recordings.
#
# Schedule: 8th and 23rd 04:30 UTC. Spread across the month with the other
# bi-monthly workloads so only one fires per day (avoids B2 cap spikes).
#
# Retention: keep the last 2 restore points. Velero retention is TTL-based
# (there is no native "keep N" count), so ttl is set to 28 days — longer than
# the ~15-16 day bi-monthly interval (so the previous backup survives) but
# shorter than two intervals (so the one before that expires). Net steady
# state: 2 backups.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: guacamole-bimonthly
  namespace: velero
spec:
  schedule: "30 4 8,23 * *"

  template:
    ttl: "672h0m0s"   # 28 days -> keep last 2 bi-monthly backups
    includedNamespaces:
      - guacamole
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
      # One-shot ACME workflow objects. Restoring these plants a stale
      # CertificateRequest that squats on the name cert-manager needs for the
      # next renewal, silently stalling it (vaultwarden-tls, 2026-07-18).
      - certificaterequests.cert-manager.io
      - orders.acme.cert-manager.io
      - challenges.acme.cert-manager.io
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
