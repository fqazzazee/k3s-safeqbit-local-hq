# velero-schedule-monitoring.yaml
# Bi-monthly Velero backup of the monitoring namespace to B2.
#
# Covers: Prometheus PVC (40Gi Longhorn — the bulk of the backup size,
# and its DataUploads to B2 have been failing; scoping TBD) and k8s objects.
# The Grafana NFS PVC (plugins/scratch, rebuildable) is skipped by the
# volume policy. NOTE: grafana-cnpg PVCs are NOT actually excluded despite
# what this comment used to claim — they upload redundantly alongside the
# CNPG ScheduledBackup; fixing that is tracked in the improvement plan.
#
# Schedule: 9th and 24th 03:00 UTC. Spread across the month with other
# bi-monthly workloads.
# Retention: 180 days

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: monitoring-bimonthly
  namespace: velero
spec:
  schedule: "0 3 9,24 * *"

  template:
    ttl: "4320h0m0s"   # 180 days
    includedNamespaces:
      - monitoring
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
