# velero-schedule-monitoring.yaml
# Bi-monthly Velero backup of the monitoring namespace to B2.
#
# Covers: k8s objects, alertmanager PVC (1Gi), grafana-cnpg PVCs (the only
# off-cluster copy of Grafana's DB until P3.1 moves CNPG to Barman/S3).
# Skipped by the volume policy: the Grafana NFS PVC (plugins/scratch,
# rebuildable) and the 40Gi Prometheus TSDB (capacity>=20Gi rule — metrics
# history is accepted DR loss per 2026-07-03 decision; it never fit the
# B2 free tier and its DataUploads had never once succeeded anyway).
#
# Schedule: 9th and 24th 03:00 UTC. Spread across the month with other
# bi-monthly workloads.
# Retention: 60 days (tuned down from 180d, 2026-07-03)

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: monitoring-bimonthly
  namespace: velero
spec:
  schedule: "0 3 9,24 * *"

  template:
    ttl: "1440h0m0s"   # 60 days
    includedNamespaces:
      - monitoring
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
