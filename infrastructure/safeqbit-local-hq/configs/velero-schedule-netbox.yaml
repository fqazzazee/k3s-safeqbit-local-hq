# velero-schedule-netbox.yaml
# Weekly Velero backup of the netbox namespace to B2.
#
# Covers: redis task queue PVC (Longhorn), SealedSecrets, manifests.
# Postgres data handled separately by CNPG ScheduledBackup
# (apps/.../netbox/04-cnpg-scheduled-backup.yaml). netbox-media/-reports/
# -scripts are NFS and skipped by the volume policy — TrueNAS protects them.
#
# Schedule: Wednesdays 03:00 UTC (mid-week timing keeps it off the bi-monthly
# day-stagger so at most one workload runs to B2 per day)
# Retention: 60 days (tuned down from 180d, 2026-07-03)

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: netbox-weekly
  namespace: velero
spec:
  schedule: "0 3 * * 3"

  template:
    ttl: "1440h0m0s"   # 60 days
    includedNamespaces:
      - netbox
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
