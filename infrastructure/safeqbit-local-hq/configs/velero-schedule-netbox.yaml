# velero-schedule-netbox.yaml
# Weekly Velero backup of the netbox namespace to B2.
#
# Covers: netbox-media + netbox-reports + netbox-scripts (RWX NFS), redis
# task queue PVC, SealedSecrets, manifests. Postgres data handled separately
# by CNPG ScheduledBackup (apps/.../netbox/04-cnpg-scheduled-backup.yaml).
#
# Schedule: Wednesdays 03:00 UTC (mid-week timing keeps it off the bi-monthly
# day-stagger so at most one workload runs to B2 per day)
# Retention: 180 days

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: netbox-weekly
  namespace: velero
spec:
  schedule: "0 3 * * 3"

  template:
    ttl: "4320h0m0s"   # 180 days
    includedNamespaces:
      - netbox
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default

  paused: false
