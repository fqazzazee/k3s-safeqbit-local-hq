# velero-schedule-pangolin.yaml
# Bi-monthly Velero backup of the pangolin namespace to B2.
#
# Postgres data is handled separately by the CNPG ScheduledBackup (weekly).
# This catches the Gerbil WireGuard-key PVC and the Traefik ACME-state PVC
# (so certs/keys survive a full namespace rebuild) plus the k8s objects
# (HelmRelease, Services, SealedSecrets, PVC defs).
#
# Schedule: 15th and 30th 04:45 UTC. Day-of-month pair unused by the other
# bi-monthly workloads (5/20, 7/22, 8/23, 9/24, 11/26, 13/28) and offset from
# the 03:00-04:30 backup window, so only one heavy backup fires at a time
# (avoids B2 throughput spikes).
#
# Retention: keep the last 2 restore points. Velero retention is TTL-based
# (no native "keep N"), so ttl=28d — longer than the ~15-16 day interval (the
# previous backup survives) but shorter than two intervals (the one before
# that expires). Net steady state: 2 backups.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: pangolin-bimonthly
  namespace: velero
spec:
  schedule: "45 4 15,30 * *"

  template:
    ttl: "672h0m0s"   # 28 days -> keep last 2 bi-monthly backups
    includedNamespaces:
      - pangolin
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default

  paused: false
