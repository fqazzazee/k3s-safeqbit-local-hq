# velero-schedule-passzilla.yaml
# Bi-monthly Velero backup of the passzilla namespace to B2.
#
# Covers: passzilla-db PVC (RWO Longhorn — Rails SQLite), SealedSecret
# (SECRET_KEY_BASE), Deployment, Service, Ingress.
#
# Schedule: 11th and 26th 03:00 UTC. Spread across the month with other
# bi-monthly workloads.
# Retention: 28 days (tuned down from 180d, 2026-07-03)

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: passzilla-bimonthly
  namespace: velero
spec:
  schedule: "0 3 11,26 * *"

  template:
    ttl: "672h0m0s"   # 28 days
    includedNamespaces:
      - passzilla
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
      # One-shot ACME workflow objects. Restoring these plants a stale
      # CertificateRequest that squats on the name cert-manager needs for the
      # next renewal, silently stalling it (vaultwarden-tls, 2026-07-18).
      - certificaterequests.cert-manager.io
      - orders.acme.cert-manager.io
      - challenges.acme.cert-manager.io
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
