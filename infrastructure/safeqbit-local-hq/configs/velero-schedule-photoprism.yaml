# velero-schedule-photoprism.yaml
# Bi-monthly Velero backup of the photoprism namespace to B2.
#
# Covers: photoprism's metadata PVCs (Longhorn) and k8s objects. The photo
# library lives on static NFS PVs pointing at TrueNAS (photoprism-import,
# photoprism-originals, photoprism-storage). Velero can NOT snapshot NFS
# (every run PartiallyFailed on them) — they are skipped by the volume
# policy; primary protection is TrueNAS's own snapshots/replication.
#
# Schedule: 13th and 28th 03:00 UTC. Spread across the month with other
# bi-monthly workloads.
# Retention: 60 days (tuned down from 180d, 2026-07-03)

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: photoprism-bimonthly
  namespace: velero
spec:
  schedule: "0 3 13,28 * *"

  template:
    ttl: "1440h0m0s"   # 60 days
    includedNamespaces:
      - photoprism
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
      # One-shot ACME workflow objects. Restoring these plants a stale
      # CertificateRequest that squats on the name cert-manager needs for the
      # next renewal, silently stalling it (vaultwarden-tls, 2026-07-18).
      - certificaterequests.cert-manager.io
      - orders.acme.cert-manager.io
      - challenges.acme.cert-manager.io
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
