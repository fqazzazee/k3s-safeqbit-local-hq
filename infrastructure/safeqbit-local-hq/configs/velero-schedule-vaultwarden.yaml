# velero-schedule-vaultwarden.yaml
# Bi-monthly Velero backup of the vaultwarden namespace to B2.
#
# Vaultwarden uses an embedded SQLite database in its data PVC, so this
# single Velero backup captures both app state and password data in one
# crash-consistent snapshot. No CNPG layer for this workload.
#
# Schedule: 7th and 22nd 03:00 UTC. Spread across the month with other
# bi-monthly workloads.
# Retention: 180 days

apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: vaultwarden-bimonthly
  namespace: velero
spec:
  schedule: "0 3 7,22 * *"

  template:
    ttl: "4320h0m0s"   # 180 days
    includedNamespaces:
      - vaultwarden
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
      - replicasets
      # One-shot ACME workflow objects. Restoring these plants a stale
      # CertificateRequest that squats on the name cert-manager needs for the
      # next renewal, silently stalling it (vaultwarden-tls, 2026-07-18).
      - certificaterequests.cert-manager.io
      - orders.acme.cert-manager.io
      - challenges.acme.cert-manager.io
    snapshotVolumes: true
    snapshotMoveData: true
    defaultVolumesToFsBackup: false
    storageLocation: default
    # Skip NFS volumes (TrueNAS owns their protection) so backups complete
    # instead of PartiallyFailing. See velero-volume-policy.yaml.
    resourcePolicy:
      kind: configmap
      name: velero-volume-policy

  paused: false
