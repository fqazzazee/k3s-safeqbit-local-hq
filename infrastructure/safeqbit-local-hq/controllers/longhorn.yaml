# longhorn.yaml
# Longhorn is a heavy chart with many CRDs. CreateReplace on upgrade is essential.

---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.11.2                      # check `helm list -n longhorn-system`
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 1h
  releaseName: longhorn
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  # Match what Lesson 7.1 deployed
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 3              # bump to 3 when third node lands
      storageOverProvisioningPercentage: 100
      storageMinimalAvailablePercentage: 15
    persistence:
      defaultClass: true                  # longhorn IS the default StorageClass now
      defaultClassReplicaCount: 3
      reclaimPolicy: Delete
    longhornUI:
      replicas: 1
    ingress:
      enabled: true
      ingressClassName: nginx
      host: longhorn.local.safeqbit.com
      tls: true
      tlsSecret: longhorn-tls
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        # If you set up basic auth on the UI in Lesson 7.1, restate the
        # auth annotations here. Otherwise omit and consider doing it later.
