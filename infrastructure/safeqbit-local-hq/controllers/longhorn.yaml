# longhorn.yaml
# Longhorn is a heavy chart with many CRDs. CreateReplace on upgrade is essential.

---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.11.3                      # check `helm list -n longhorn-system`
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 1h
  releaseName: longhorn
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  # Match what Lesson 7.1 deployed
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 3              # bump to 3 when third node lands
      storageOverProvisioningPercentage: 100
      storageMinimalAvailablePercentage: 15
      # Auto-delete orphaned replica directories left over from failed/rebuilt
      # replicas. Without this, the dirs accumulate and exhaust disk space —
      # e.g. on 2026-05-27 server-02 had 14 orphan dirs taking 100 GiB,
      # blocking the Prometheus volume from rebuilding to 3 replicas.
      orphanResourceAutoDeletion: replica-data
      orphanResourceAutoDeletionGracePeriod: 300
      # When a node goes down, force-delete the stuck-Terminating pods whose
      # RWO volumes are attached to it so they can reschedule and reattach on
      # a healthy node. Default is do-nothing, which left alertmanager (and
      # would leave every RWO singleton: prometheus, vaultwarden, uptime-kuma,
      # affine, pulse…) down for the whole 2026-07-08 server-01 outage —
      # a dead node can't cooperate in releasing its volume attachments.
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      # Live-upgrade volume engines after a chart upgrade. The default (0)
      # disables this entirely, so attached volumes stay on the old engine
      # forever — after 1.11.3 all 23 volumes were still running the 1.11.2
      # engine with the old instance-managers pinned in place.
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
    persistence:
      defaultClass: true                  # longhorn IS the default StorageClass now
      defaultClassReplicaCount: 3
      reclaimPolicy: Delete
    longhornUI:
      replicas: 2
    ingress:
      enabled: true
      ingressClassName: nginx
      host: longhorn.local.safeqbit.com
      tls: true
      tlsSecret: longhorn-tls
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        # If you set up basic auth on the UI in Lesson 7.1, restate the
        # auth annotations here. Otherwise omit and consider doing it later.
