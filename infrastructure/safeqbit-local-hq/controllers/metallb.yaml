# metallb.yaml
# MetalLB chart. Installs metallb-controller (1 Pod) and metallb-speaker
# (DaemonSet, one Pod per node). The chart ships the IPAddressPool, L2Advertisement,
# and BGPPeer CRDs which are needed before our pools.yaml can apply.

---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 1h
  chart:
    spec:
      chart: metallb
      version: 0.15.3                     # check `helm list -n metallb-system`
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
      interval: 1h
  releaseName: metallb
  install:
    remediation:
      retries: 3
    crds: CreateReplace                   # IPAddressPool, L2Advertisement CRDs
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    controller:
      replicas: 2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: metallb
                    app.kubernetes.io/component: controller
                topologyKey: kubernetes.io/hostname
