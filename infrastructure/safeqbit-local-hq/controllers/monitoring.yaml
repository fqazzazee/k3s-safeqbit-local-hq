# monitoring.yaml
# Largest chart of the bunch. Installs Prometheus, Grafana, Alertmanager,
# node-exporter, kube-state-metrics, and a stack of pre-built dashboards.
# The values block here is a copy of ~/k3s-lab/monitoring/values.yaml.

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.5.0                     # check `helm list -n monitoring`
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  releaseName: monitoring
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
    # kube-prometheus-stack regularly changes immutable fields (selectors,
    # PodTemplateSpec). Helm errors out unless we recreate. Set this if you
    # see "field is immutable" on chart upgrades; safe to leave default until then.
    force: true
    # Don't block on DaemonSet rollout — node-exporter on a NotReady node
    # will stall the upgrade indefinitely otherwise.
    disableWait: true
  # The Grafana admin password is sensitive. Reference a SealedSecret instead
  # of putting plaintext in values. The chart supports admin.existingSecret.
  values:
    defaultRules:
      create: true
      rules:
        kubeApiserverAvailability: true
        kubeApiserverSlos: true
        nodeExporterAlerting: true
        etcd: true
        # k3s embeds kube-proxy, scheduler, and controller-manager inside
        # the single k3s server process. The default rules assume separate
        # deployments and fire false-positive `*Down` alerts forever.
        # Disable them at the rule-source level — cleaner than silencing.
        kubeProxy: false
        kubeScheduler: false
        kubeControllerManager: false
    # Disable the corresponding ServiceMonitors / scrape jobs too — they
    # also fail and pollute target health.
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    prometheus:
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          # Authentik forward auth (embedded outpost, nginx flavor). The
          # /outpost.goauthentik.io path route lives in
          # configs/monitoring-forward-auth.yaml. Guards ONLY ingress
          # traffic — Grafana datasources, the summary CronJobs and
          # Alertmanager->Slack all use in-cluster/outbound paths.
          #
          # auth-url deliberately hairpins through the ingress hostname
          # rather than the authentik-server service DNS: the EMBEDDED
          # outpost routes requests to its proxy by Host header, and
          # nginx's auth subrequest sets Host from the auth-url. With the
          # service DNS the subrequest fell through to Django and 404'd
          # (surfaced as 500 on every page). Verified 2026-07-04.
          nginx.ingress.kubernetes.io/auth-url: https://prometheus.local.safeqbit.com/outpost.goauthentik.io/auth/nginx
          nginx.ingress.kubernetes.io/auth-signin: https://prometheus.local.safeqbit.com/outpost.goauthentik.io/start?rd=$escaped_request_uri
          nginx.ingress.kubernetes.io/auth-response-headers: Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
          # Authentik's auth responses carry large cookies; default 4k
          # proxy buffers can throw "upstream sent too big header".
          nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
        hosts:
          - prometheus.local.safeqbit.com
        tls:
          - secretName: prometheus-tls
            hosts:
              - prometheus.local.safeqbit.com
      prometheusSpec:
        # Reachable URL for alert generatorURL/"Source" links (Slack, Alertmanager
        # UI). Without it links point at the in-cluster pod URL.
        externalUrl: https://prometheus.local.safeqbit.com
        # Disable the chart's default podMonitorSelector (matchLabels: release: monitoring).
        # With this false, Prometheus gets no selector and matches ALL PodMonitors
        # in any namespace. Required for third-party operators like CNPG that
        # create PodMonitors without the release label and have no way to inject it.
        podMonitorSelectorNilUsesHelmValues: false
        retention: 30d
        # Size cap so the TSDB self-trims and can never fill the volume again.
        # 2026-06-28: disk hit 100% (no size cap) and wedged Prometheus -> Grafana
        # showed no data. Keep this comfortably below the volume size to leave
        # headroom for the WAL and compaction. Whichever of retention/retentionSize
        # is reached first triggers block deletion.
        retentionSize: 33GB
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              # NOTE (2026-06-28): the LIVE PVC is on `longhorn`, not nfs-truenas.
              # The existing PVC predates this git value and STS volumeClaimTemplates
              # are immutable, so this storageClassName only applies to a fresh
              # re-deploy. Live volume was expanded 30Gi -> 40Gi (manual PVC patch,
              # the most the Longhorn disk's over-provisioning limit allowed).
              storageClassName: nfs-truenas
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 40Gi
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: nfs-truenas
        size: 5Gi
      # Recreate: the grafana PVC is RWO (NFS sub-dir provisioner forces
      # ReadWriteOnce). RollingUpdate would deadlock on Multi-Attach during
      # pod-template changes.
      # Note: chart default has a rollingUpdate sub-block. Helm deep-merges
      # values, so we must explicitly null that sub-block — Kubernetes
      # rejects a Deployment with both `type: Recreate` AND a rollingUpdate
      # field populated.
      deploymentStrategy:
        type: Recreate
        rollingUpdate: null
      # Reference a Secret created by SealedSecret rather than embedding the
      # admin password in this manifest. See grafana-admin.yaml in configs/.
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      # Use PostgreSQL (CNPG) instead of SQLite. Grafana 13's unified storage
      # runs background jobs against the DB every 30s; SQLite over NFS deadlocks
      # under any sustained query load. PostgreSQL handles concurrent connections
      # without file-level locking. The CNPG cluster is in grafana-cnpg.yaml.
      grafana.ini:
        database:
          type: postgres
          host: grafana-cnpg-rw.monitoring:5432
          name: grafana
          user: grafana
          ssl_mode: disable
        server:
          # Grafana 13's embedded API server spawns internal self-calls that can
          # pile up under load. Cap handler duration so a burst of slow requests
          # doesn't stall /api/health and trigger liveness-probe kills.
          read_timeout: 60
          write_timeout: 60
      # Inject the auto-generated CNPG password without putting it in plaintext.
      envValueFrom:
        GF_DATABASE_PASSWORD:
          secretKeyRef:
            name: grafana-cnpg-app
            key: password
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.local.safeqbit.com
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.local.safeqbit.com
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
    alertmanager:
      enabled: true
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          # Authentik forward auth — see the prometheus ingress notes above
          # (incl. why auth-url hairpins through the hostname).
          nginx.ingress.kubernetes.io/auth-url: https://alertmanager.local.safeqbit.com/outpost.goauthentik.io/auth/nginx
          nginx.ingress.kubernetes.io/auth-signin: https://alertmanager.local.safeqbit.com/outpost.goauthentik.io/start?rd=$escaped_request_uri
          nginx.ingress.kubernetes.io/auth-response-headers: Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
          nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
        hosts:
          - alertmanager.local.safeqbit.com
        tls:
          - secretName: alertmanager-tls
            hosts:
              - alertmanager.local.safeqbit.com
      alertmanagerSpec:
        # Reachable URL for notification links ({{ .ExternalURL }} in Slack
        # messages). Without it links point at the in-cluster service URL.
        externalUrl: https://alertmanager.local.safeqbit.com
        # Modest storage — alert history only, not metrics. 1Gi is plenty.
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        # Mount the Slack webhook from a SealedSecret so it never lands in git
        # or Helm history. Must live under alertmanagerSpec (not alertmanager:)
        # or the chart silently ignores it and nothing is mounted.
        # See configs/alertmanager-slack.yaml for the SealedSecret stub.
        secrets:
          - alertmanager-slack-webhook
      # Inline Alertmanager configuration. The chart will template this into
      # the `alertmanager-monitoring-kube-prometheus-alertmanager` Secret.
      config:
        global:
          resolve_timeout: 5m
          # Webhook URL is read at runtime from the mounted secret file.
          # AM substitutes ${SLACK_WEBHOOK_URL} from the env when the
          # `slack_api_url_file` field points at the mounted secret.
          slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
        route:
          group_by: ['alertname', 'severity', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'slack-default'
          routes:
            # Suppress the always-firing Watchdog (it's a heartbeat the chart ships)
            - matchers:
                - alertname = "Watchdog"
              receiver: 'null'
            # Info = positive confirmations (e.g. VeleroBackupSucceeded).
            # One message per event: no resolved follow-up, and repeat_interval
            # far exceeds the alert's firing window so it never re-sends.
            - matchers:
                - severity = "info"
              receiver: 'slack-info'
              group_wait: 1m
              repeat_interval: 24h
            # Critical → fire faster
            - matchers:
                - severity = "critical"
              receiver: 'slack-default'
              group_wait: 10s
              repeat_interval: 1h
        receivers:
          - name: 'null'
          - name: 'slack-default'
            slack_configs:
              # No channel override: incoming webhooks are bound to a channel at
              # creation, and overriding with a name Slack can't resolve fails
              # the whole notification (404 channel_not_found).
              - send_resolved: true
                title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                text: |-
                  {{ range .Alerts -}}
                  *Severity:* {{ .Labels.severity }}
                  *Namespace:* {{ .Labels.namespace }}
                  *Summary:* {{ .Annotations.summary }}
                  *Description:* {{ .Annotations.description }}
                  {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
                  {{ end }}
          - name: 'slack-info'
            slack_configs:
              - send_resolved: false
                title: '✅ {{ .CommonLabels.alertname }}'
                text: |-
                  {{ range .Alerts -}}
                  {{ .Annotations.summary }}
                  {{ end }}
    # Flux reconciliation visibility (P3.5). The old gotk_reconcile_condition
    # metric no longer exists in Flux v2.8+ — instead the SHARED kube-state-
    # metrics instance is taught to emit `gotk_resource_info{ready=...,
    # suspended=...}` per Flux object via the Custom Resource State API
    # (canonical config: fluxcd/flux2-monitoring-example).
    #
    # CRITICAL: the upstream example also sets `collectors: []` and
    # `--custom-resource-state-only=true` because it runs a DEDICATED KSM.
    # Do NOT add those here — they would disable every standard kube_* metric
    # and break the existing dashboards + most kube-prometheus-stack alerts.
    #
    # GVK list is trimmed to the CRDs actually installed (verified 2026-07-05):
    # image.toolkit.fluxcd.io/* is absent (no image-automation controllers),
    # and notification.* kinds carry no Ready condition worth alerting on.
    # If image automation is ever installed, re-add its GVKs from the upstream
    # example. Alert rules live in configs/monitoring-flux-rules.yaml.
    kube-state-metrics:
      rbac:
        extraRules:
          - apiGroups:
              - source.toolkit.fluxcd.io
              - kustomize.toolkit.fluxcd.io
              - helm.toolkit.fluxcd.io
            resources:
              - gitrepositories
              - buckets
              - helmrepositories
              - helmcharts
              - ocirepositories
              - kustomizations
              - helmreleases
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: kustomize.toolkit.fluxcd.io
                  version: v1
                  kind: Kustomization
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Kustomization resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, lastAppliedRevision]
                      source_name: [spec, sourceRef, name]
              - groupVersionKind:
                  group: helm.toolkit.fluxcd.io
                  version: v2
                  kind: HelmRelease
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmRelease resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, history, "0", chartVersion]
                      chart_name: [status, history, "0", chartName]
                      chart_app_version: [status, history, "0", appVersion]
                      chart_ref_name: [spec, chartRef, name]
                      chart_source_name: [spec, chart, spec, sourceRef, name]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: GitRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux GitRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmChart
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmChart resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      chart_name: [spec, chart]
                      chart_version: [spec, version]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: OCIRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux OCIRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: Bucket
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Bucket resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      endpoint: [spec, endpoint]
                      bucket_name: [spec, bucketName]
    prometheus-windows-exporter:
      enabled: false
    windowsMonitoring:
      enabled: false
