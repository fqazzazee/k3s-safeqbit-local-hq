# monitoring.yaml
# Largest chart of the bunch. Installs Prometheus, Grafana, Alertmanager,
# node-exporter, kube-state-metrics, and a stack of pre-built dashboards.
# The values block here is a copy of ~/k3s-lab/monitoring/values.yaml.

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.5.0                     # check `helm list -n monitoring`
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  releaseName: monitoring
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
    # kube-prometheus-stack regularly changes immutable fields (selectors,
    # PodTemplateSpec). Helm errors out unless we recreate. Set this if you
    # see "field is immutable" on chart upgrades; safe to leave default until then.
    force: true
    # Don't block on DaemonSet rollout — node-exporter on a NotReady node
    # will stall the upgrade indefinitely otherwise.
    disableWait: true
  # The Grafana admin password is sensitive. Reference a SealedSecret instead
  # of putting plaintext in values. The chart supports admin.existingSecret.
  values:
    defaultRules:
      create: true
      rules:
        kubeApiserverAvailability: true
        kubeApiserverSlos: true
        nodeExporterAlerting: true
        etcd: true
    prometheus:
      prometheusSpec:
        # Disable the chart's default podMonitorSelector (matchLabels: release: monitoring).
        # With this false, Prometheus gets no selector and matches ALL PodMonitors
        # in any namespace. Required for third-party operators like CNPG that
        # create PodMonitors without the release label and have no way to inject it.
        podMonitorSelectorNilUsesHelmValues: false
        retention: 30d
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-truenas
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 30Gi
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: tier
                      operator: In
                      values:
                        - primary
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: nfs-truenas
        size: 5Gi
      # Reference a Secret created by SealedSecret rather than embedding the
      # admin password in this manifest. See grafana-admin.yaml in configs/.
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      # Use PostgreSQL (CNPG) instead of SQLite. Grafana 13's unified storage
      # runs background jobs against the DB every 30s; SQLite over NFS deadlocks
      # under any sustained query load. PostgreSQL handles concurrent connections
      # without file-level locking. The CNPG cluster is in grafana-cnpg.yaml.
      grafana.ini:
        database:
          type: postgres
          host: grafana-cnpg-rw.monitoring:5432
          name: grafana
          user: grafana
          ssl_mode: disable
        server:
          # Grafana 13's embedded API server spawns internal self-calls that can
          # pile up under load. Cap handler duration so a burst of slow requests
          # doesn't stall /api/health and trigger liveness-probe kills.
          read_timeout: 60
          write_timeout: 60
      # Inject the auto-generated CNPG password without putting it in plaintext.
      envValueFrom:
        GF_DATABASE_PASSWORD:
          secretKeyRef:
            name: grafana-cnpg-app
            key: password
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.local.safeqbit.com
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.local.safeqbit.com
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: tier
                    operator: In
                    values:
                      - primary
    alertmanager:
      enabled: false
    prometheus-windows-exporter:
      enabled: false
    windowsMonitoring:
      enabled: false
