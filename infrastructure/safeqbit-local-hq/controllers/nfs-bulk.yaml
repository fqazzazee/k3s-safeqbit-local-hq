# nfs-bulk.yaml
# Bulk-media NFS provisioner for the TrueNAS Media share at
# 10.10.10.5:/mnt/mach2/mach2nas/Media.
#
# StorageClass nfs-bulk-media: RWX, dynamic provisioning, for any new workload
# that needs storage on the bulk array. Immich and Photoprism do NOT use
# dynamic provisioning — they use static PVs pointing to pre-existing
# directories on this share so no data migration is required.

---
apiVersion: v1
kind: Namespace
metadata:
  name: nfs-bulk-media

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-bulk-media
  namespace: nfs-bulk-media
spec:
  interval: 1h
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: 4.0.18
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system
      interval: 1h
  releaseName: nfs-bulk-media
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    nfs:
      server: 10.10.10.5
      path: /mnt/mach2/mach2nas/Media
      mountOptions:
        - nfsvers=4.2
        - hard
        - noatime
    storageClass:
      create: true
      name: nfs-bulk-media
      defaultClass: false
      reclaimPolicy: Retain
      pathPattern: "${.PVC.namespace}-${.PVC.name}-${.PV.name}"
      onDelete: archive
      allowVolumeExpansion: true
      accessModes: ReadWriteMany
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
