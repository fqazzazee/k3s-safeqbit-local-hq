# sealed-secrets.yaml
# The bootstrap-special chart. As discussed in Part 0, this chart can be
# managed by Flux, but the master key Secret has to exist in kube-system
# BEFORE the controller starts on a fresh cluster, otherwise it generates
# a new one and your existing SealedSecrets become unreadable.
#
# The chart's release name is "sealed-secrets-controller" by Lesson 4 convention.

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: sealed-secrets
      version: 2.18.5                     # check `helm list -n kube-system`
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
      interval: 1h
  # IMPORTANT: matches the original imperative install from Lesson 4
  releaseName: sealed-secrets-controller
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    fullnameOverride: sealed-secrets-controller
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    nodeSelector:
      tier: primary
    metrics:
      serviceMonitor:
        enabled: true
