# velero.yaml
# Velero with CSI snapshot data movement against B2. The B2 credentials are
# referenced as a Secret named "velero-b2-credentials"; we materialize that
# from a SealedSecret in configs/velero-b2.yaml.

---
apiVersion: v1
kind: Namespace
metadata:
  name: velero
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      version: 12.0.1                      # check `helm list -n velero`
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
      interval: 1h
  releaseName: velero
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.0
        volumeMounts:
          - mountPath: /target
            name: plugins
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: k3s-safeqbit-local-hq-velero
          # Both default to ~1m, which is ~3,000 B2 Class C (list) calls/day —
          # alone exceeding the 2,500/day free-tier cap and triggering the
          # daily 75%/100% cap emails (and hard blocks at 100% pre-2026-05).
          # Hourly is ~50/day. At a daily-at-most backup cadence, a 1h delay
          # on syncing bucket state / validating connectivity costs nothing.
          backupSyncPeriod: 1h
          validationFrequency: 1h
          config:
            region: us-east-005      # e.g. us-east-005
            s3ForcePathStyle: "true"
            s3Url: https://s3.us-east-005.backblazeb2.com     # e.g. https://s3.us-east-005.backblazeb2.com
      volumeSnapshotLocation:
        - name: default
          provider: csi
      features: EnableCSI
      defaultVolumesToFsBackup: false
      # Default kopia maintenance every 7 days (was hourly, which burnt B2 free-tier
      # transaction cap). Each existing BackupRepository was also patched at runtime
      # with maintenanceFrequency: 168h on 2026-05-27 so this matches new defaults.
      defaultRepoMaintainFrequency: 168h0m0s
    credentials:
      useSecret: true
      existingSecret: cloud-credentials
    snapshotsEnabled: true
    deployNodeAgent: true
    schedules: {}                          # populated by app-level schedules
